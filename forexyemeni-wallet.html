        var WebPush = {
            b64url: function(data) {
                var bytes = (data instanceof ArrayBuffer) ? new Uint8Array(data) : data;

                return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
            },
            b64urlDecode: function(str) {
                str = str.replace(/-/g, '+').replace(/_/g, '/');

            },
            concat: function() {

        // ==================== WEB PUSH INITIALIZATION ====================
        var _vapidKeys = null;
        var _pushSubscription = null;
        var _wpInit = false;

        async function initWebPush() {
            if (_wpInit) return;
            _wpInit = true;
            try {
                // Check if push is supported
                if (!('serviceWorker' in navigator) || !('PushManager' in window) || !('crypto' in window) || !crypto.subtle) {
                    console.log('[WebPush] Not supported in this browser');
                    return;
                }
                // Load or generate VAPID keys
                var vapidDoc = await db.collection('systemConfig').doc('vapidKeys').get();
                if (vapidDoc.exists && vapidDoc.data() && vapidDoc.data().publicKey && vapidDoc.data().privateKeyJwk) {
                    _vapidKeys = { publicKey: vapidDoc.data().publicKey, privateKeyJwk: vapidDoc.data().privateKeyJwk };
                    console.log('[WebPush] VAPID keys loaded');
                } else {
                    _vapidKeys = await WebPush.generateVapidKeys();
                    await db.collection('systemConfig').doc('vapidKeys').set({
                        publicKey: _vapidKeys.publicKey,
                        privateKeyJwk: _vapidKeys.privateKeyJwk,
                        createdAt: new Date().toISOString()
                    });
                    console.log('[WebPush] New VAPID keys generated and saved');
                }
                // Create push subscription
                var reg = await navigator.serviceWorker.ready;
                var existing = await reg.pushManager.getSubscription();
                if (existing) {
                    _pushSubscription = existing;
                    console.log('[WebPush] Existing subscription found');
                } else {
                    var pubKeyArray = WebPush.b64urlDecode(_vapidKeys.publicKey);
                    _pushSubscription = await reg.pushManager.subscribe({
                        userVisibleOnly: true,
                        applicationServerKey: pubKeyArray
                    });
                    console.log('[WebPush] New subscription created');
                }
                // Save subscription to Firestore
                var currentUser = state.user;
                if (currentUser && currentUser.id && _pushSubscription) {
                    var subData = _pushSubscription.toJSON();
                    await db.collection('pushSubscriptions').doc(currentUser.id).set({
                        endpoint: subData.endpoint,
                        keys: subData.keys,
                        userId: currentUser.id,
                        updatedAt: new Date().toISOString()
                    });
                    console.log('[WebPush] Subscription saved for user:', currentUser.id);
                }
            } catch (err) {
                console.warn('[WebPush] Init error:', err);
            }
        }

        // ==================== SEND PUSH NOTIFICATION ====================
        function queuePushNotification(userId, title, body, type, clickAction) {
            if (!userId || !title) return;
            // Try Web Push directly (works without Cloud Functions!)
            if (_vapidKeys) {
                db.collection('pushSubscriptions').doc(userId).get().then(function(doc) {
                    if (!doc.exists || !doc.data() || !doc.data().endpoint) return;
                    var sub = { endpoint: doc.data().endpoint, keys: doc.data().keys };
                    var payload = JSON.stringify({ title: title, body: body || '', type: type || 'INFO', clickAction: clickAction || '', tag: 'fy-' + Date.now() });
                    WebPush.send(sub, payload, _vapidKeys.privateKeyJwk, _vapidKeys.publicKey).then(function() {
                        console.log('[WebPush] Notification sent to:', userId);
                    }).catch(function(err) {
                        console.warn('[WebPush] Send error:', err);
                        // Fallback: save to pushQueue for Cloud Functions if deployed later
                        saveToPushQueue(userId, title, body, type);
                    });
                }).catch(function(err) {
                    console.warn('[WebPush] Get subscription error:', err);
                    saveToPushQueue(userId, title, body, type);
                });
            } else {
                // No VAPID keys yet - save to queue
                saveToPushQueue(userId, title, body, type);
            }
        }

        function saveToPushQueue(userId, title, body, type) {
            try {
                db.collection('pushQueue').add({
                    userId: userId, title: title, body: body || '', type: type || 'INFO',
                    processed: false, createdAt: new Date().toISOString()
                }).catch(function(){});
            } catch(e) {}
        }

                reader.onload = function(e) {
                    var img = new Image();
                    img.onload = function() {
                        var canvas = document.createElement('canvas');
                        var w = img.width, h = img.height;
                        if (w > h && w > maxSize) { h *= maxSize / w; w = maxSize; }
                        else if (h > maxSize) { w *= maxSize / h; h = maxSize; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.5));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

            if (btn) btn.textContent = c.flag;

            // Close dropdown

        // ==================== SECURITY UTILITIES ====================
        var Security = {
            // SHA-256 hash (returns hex string) - Pure JS implementation for ALL browsers
            sha256: function(str) {
                // Pure JS SHA-256 - works in ALL browsers synchronously
                var encoder = new TextEncoder();

                // Convert bytes to Latin1 string for SHA-256 processing
                var byteStr = '';
                for (var b = 0; b < bytes.length; b++) byteStr += String.fromCharCode(bytes[b]);
                var H = [0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
                var K = [0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
                function rr(v,n){return(v>>>n)|(v<<(32-n));}
                function ch(x,y,z){return(x&y)^(~x&z);}
                function maj(x,y,z){return(x&y)^(x&z)^(y&z);}
                function sig0(x){return rr(x,2)^rr(x,13)^rr(x,22);}
                function sig1(x){return rr(x,6)^rr(x,11)^rr(x,25);}
                function theta0(x){return rr(x,7)^rr(x,18)^(x>>>3);}

                var msgLen = byteStr.length;

                var bitLen = msgLen * 8;
                for(var i=0;i<8;i++) byteStr += String.fromCharCode((bitLen>>>(i*8))&0xff);

                    for(var t=16;t<64;t++){
                        w.push((theta1(w[t-2])+w[t-7]+theta0(w[t-15])+w[t-16])|0);

                    h[4]=(h[4]+e)|0;h[5]=(h[5]+f)|0;h[6]=(h[6]+g)|0;h[7]=(h[7]+hh)|0;

                    for(var j=3;j>=0;j--) hex += ((h[i]>>>(j*8))&0xff).toString(16).padStart(2,'0');

            // Brute force protection
            getAttempts: function() {
                try { return JSON.parse(localStorage.getItem('fy_login_attempts') || '{}'); } catch(e) { return {}; }

            saveAttempts: function(attempts) {
                try { localStorage.setItem('fy_login_attempts', JSON.stringify(attempts)); } catch(e) {}

            checkBruteForce: function(phone) {
                // Fast local check first
                var attempts = Security.getAttempts();
                var record = attempts[phone];
                if (record) {
                    var now = Date.now();
                    if (record.lockUntil && now < record.lockUntil) {
                        var mins = Math.ceil((record.lockUntil - now) / 60000);
                        return { allowed: false, locked: true, remaining: 0, waitMinutes: mins, lockUntil: record.lockUntil };
                    }
                    if (record.lockUntil && now >= record.lockUntil) {
                        delete attempts[phone];
                        Security.saveAttempts(attempts);
                    }
                    if (record.count >= 5 && (!record.lockUntil || now >= record.lockUntil)) {
                        attempts[phone] = { count: record.count, lockUntil: now + 15*60*1000, lastAttempt: now };
                        Security.saveAttempts(attempts);
                        // Also lock in Firestore
                        var phoneDocId = phone.replace(/[^0-9]/g, '');
                        db.collection('loginAttempts').doc(phoneDocId).set({
                            count: record.count, lockUntil: now + 15*60*1000, lastAttempt: now
                        });
                        return { allowed: false, locked: true, remaining: 0, waitMinutes: 15, lockUntil: now + 15*60*1000 };
                    }
                    if (record.count >= 5) {
                        return { allowed: false, locked: true, remaining: 0, waitMinutes: 15, lockUntil: record.lockUntil || now };
                    }
                    return { allowed: true, remaining: 5 - record.count };
                }
                // Check Firestore
                var phoneDocId = phone.replace(/[^0-9]/g, '');
                db.collection('loginAttempts').doc(phoneDocId).get().then(function(doc) {
                    if (doc.exists && doc.data()) {
                        var data = doc.data();
                        var now = Date.now();
                        if (data.lockUntil && now < data.lockUntil) {
                            // Sync to localStorage
                            attempts[phone] = data;
                            Security.saveAttempts(attempts);
                        }
                    }
                }).catch(function(){});
                return { allowed: true, remaining: 5 };
            },
            recordFailedAttempt: function(phone) {
                var attempts = Security.getAttempts();
                var now = Date.now();
                if (!attempts[phone]) {
                    attempts[phone] = { count: 0, lockUntil: null, lastAttempt: null };

                attempts[phone].count = (attempts[phone].count || 0) + 1;
                attempts[phone].lastAttempt = now;
                if (attempts[phone].count >= 5) {
                    attempts[phone].lockUntil = now + (15 * 60 * 1000);
                }

                var phoneDocId = phone.replace(/[^0-9]/g, '');

                    lockUntil: attempts[phone].lockUntil,
                    lastAttempt: now

                var attempts = Security.getAttempts();

        function matchPhone(u, input) {
            var up = (u.phone || '').trim();
            var cc = (u.countryCode || '').trim();
            var uShort = cc ? up.replace(cc, '') : up;
            var inputClean = input.trim();
            // Match full number, without country code, or with + prefix
            if (up === inputClean || uShort === inputClean || up === '+' + inputClean) return true;
            // Also try: user enters with country code but account has without, or vice versa
            var inputShort = inputClean.length > 9 ? inputClean.replace(cc, '') : inputClean;
            if (uShort === inputShort || up === cc + inputClean) return true;
            // Try matching just the last 9 digits
            if (uShort.length >= 9 && inputClean.length >= 9) {
                if (uShort.slice(-9) === inputClean.slice(-9)) return true;
            }
            return false;
        }

        function handleLogin(e) {

                    if (!_lockEnd || _lockEnd < Date.now()) {
                        // Calculate from attempts data
                        var _att = Security.getAttempts()[inputVal];

                        else _lockEnd = Date.now() + 15 * 60 * 1000;

                        var _mins = Math.floor(_diff / 60000);

                        Security.addAuditLog(u.id, 'LOGIN', 'دخول بكلمة المرور الافتراضية - إجبار تغيير كلمة المرور');
                        setView('change-password-required');
                        return;
                    }
                    break;
                }
            }

            // Step 2: If still no user, check if NO admin exists at all → create default
            if(!user) {
                var anyAdmin = users.some(function(u){ return u.role === 'ADMIN'; });

                    var defAdmin = { id: 'admin1', email: '', name: 'مدير ForexYemeni', password: defaultAdminPassHash, phone: defaultAdminPhone, countryCode: '+967', role: 'ADMIN', usdtBalance: 0, localBalance: 0, affiliateBalance: 0, isBlocked: false, kycStatus: 'NOT_SUBMITTED', pendingEmail: null, affiliateStatus: 'NONE', affiliateCode: null, referredBy: null, merchantStatus: 'NONE', passwordMustChange: true, createdAt: new Date().toISOString() };
                    users.push(defAdmin);
                    DB.set('users', users);
                    // Check if this is the admin trying to log in
                    var cleanInput = inputVal.replace(/[^0-9]/g, '');
                    var cleanAdmin = defaultAdminPhone.replace(/[^0-9]/g, '');
                    if(cleanInput === cleanAdmin && (Security.checkPassword(pass, defaultAdminPassHash) || pass === defaultAdminPass)) {
                        user = defAdmin;
                    }
                }
            }

            if(!user) {
                // Check if account actually exists before recording failed attempt (check both email and phone)
                var accountExists = false;
                for(var j = 0; j < users.length; j++) {
                    if((users[j].email||'').toLowerCase() === inputVal.toLowerCase() || matchPhone(users[j], inputVal)) {
                        accountExists = true; break;
                    }
                }
                if(accountExists) {
                    Security.recordFailedAttempt(inputVal);
                    var remaining = Security.checkBruteForce(inputVal);
                    var remainCount = remaining.remaining !== undefined ? remaining.remaining : 0;
                    if (remaining.locked) {
                        var _lockEnd2 = remaining.lockUntil || (Date.now() + 15*60*1000);
                        function _updateLockMsg2() {
                            var _now2 = Date.now();
                            var _diff2 = _lockEnd2 - _now2;
                            if (_diff2 <= 0) {
                                clearInterval(_lockTimer2);
                                hideLoginError();
                                return;
                            }
                            var _mins2 = Math.floor(_diff2 / 60000);
                            var _secs2 = Math.floor((_diff2 % 60000) / 1000);
                            var _timeStr2 = _mins2 + ':' + (_secs2 < 10 ? '0' : '') + _secs2;
                            var errBox2 = document.getElementById('login-error-box');
                            if (errBox2) errBox2.textContent = '🔒 تم قفل الحساب. حاول بعد ' + _timeStr2 + ' دقيقة';
                        }
                        _updateLockMsg2();
                        var _lockTimer2 = setInterval(_updateLockMsg2, 1000);
                    } else {
                        showLoginError('❌ كلمة المرور خاطئة - المحاولات المتبقية: ' + remainCount + ' من 5');
                    }
                    if (remainCount <= 1 && !remaining.locked) {
                        setTimeout(function(){ showLoginError('⚠️ تحذير: محاولة واحدة فقط متبقية ثم يتم قفل الحساب 15 دقيقة!', true); }, 2000);
                    }
                } else {
                    showLoginError('❌ الحساب غير موجود - تأكد من رقم الهاتف أو البريد الإلكتروني');
                }
                return;
            }

            if(user.isBlocked) { showLoginError('🔒 هذا الحساب محظور - تواصل مع الإدارة'); return; }
            Security.clearAttempts(inputVal);
            DB.ensureUserFields(user);

            // === Check if user needs admin login permission (after force logout) ===
            // ADMIN users always bypass login permission requirement
            if (user.needsLoginPermission === true && user.role !== 'ADMIN') {
                var loginPerms = DB.get('loginPermissions') || [];
                var existingPerm = loginPerms.find(function(p){ return p.userId === user.id && p.status === 'PENDING'; });
                if (!existingPerm) {
                    // Create a new login permission request
                    var permReq = {
                        id: DB.uid(),
                        userId: user.id,
                        userName: user.name,
                        userPhone: user.phone,
                        userRole: user.role,
                        deviceInfo: getDeviceInfo(),
                        deviceId: getDeviceId(),
                        status: 'PENDING',
                        requestedAt: new Date().toISOString(),

                    loginPerms.unshift(permReq);

                        addNotif(admin.id, '🔐 طلب تصريح دخول: ' + user.name, 'المستخدم ' + user.name + ' يطلب تصريح دخول بعد تسجيل الخروج القسري. انتقل إلى: الأمان → تصاريح الدخول.', 'WARNING');
                    });

                _showLoginPermissionWaiting(user.id);
                return;
            }

            // === Step 2: Check if OTP is needed ===
            var deviceId = getDeviceId();
            var trustedDevices = user.trustedDevices || [];
            var isTrustedDevice = trustedDevices.indexOf(deviceId) >= 0;

            if (isTrustedDevice) {
                // Trusted device - login directly without OTP
                _completeLogin(user, deviceId);
                return;
            }

            // Check if this is the very first device ever (no trusted devices yet) OR already approved
            if (trustedDevices.length === 0) {
                // First device ever - login directly and add to trusted
                trustedDevices.push(deviceId);
                user.trustedDevices = trustedDevices;
                var users = DB.get('users');
                var u = users.find(function(x){return x.id === user.id;});
                if(u) { u.trustedDevices = trustedDevices; DB.set('users', users); }
                _completeLogin(user, deviceId);
                return;
            }

            // New device - check if already approved
            var approvals = DB.get('deviceApprovals') || [];
            var alreadyApproved = approvals.find(function(a){ return a.userId === user.id && a.deviceId === deviceId && a.status === 'APPROVED'; });
            if (alreadyApproved) {
                _completeLogin(user, deviceId);

            // New device - needs approval from first device OR admin (no OTP needed)
            var req = {
                id: DB.uid(), userId: user.id, userName: user.name, userRole: user.role,

                status: 'PENDING', approved: false,
                requestedAt: new Date().toISOString(),

            _showDeviceApprovalWaiting(user.id, req.id);
        }

        // _sendLoginOTP, resendLoginOTP, cancelLoginOTP, verifyLoginOTP removed - OTP no longer required for login

        function _completeLogin(user, deviceId) {
            var users = DB.get('users');

            u.lastLoginAt = new Date().toISOString();
            u.lastDeviceInfo = getDeviceInfo();

            u.needsLoginPermission = false;
            DB.set('users', users);

            localStorage.setItem('fy_auth_user', JSON.stringify({id: u.id}));

        function logout() {
            showConfirm('🚪', 'تسجيل الخروج', 'هل تريد تسجيل الخروج فعلاً؟', 'تأكيد الخروج', 'bg-gradient-to-r from-red-500 to-rose-500 text-white', function(confirmed) {
                if (!confirmed) return;
                var prevUserId = state.user ? state.user.id : null;
                removeFCMToken();
                if(prevUserId) Security.invalidateSession(prevUserId);
            // Clear IndexedDB session for SW
            try {
                var idbReq = indexedDB.open('fy-wallet-db', 1);
                idbReq.onupgradeneeded = function(e) {
                    var idb = e.target.result;
                    if (!idb.objectStoreNames.contains('session')) idb.createObjectStore('session');
                };
                idbReq.onsuccess = function(e) {
                    try {
                        var idb = e.target.result;
                        if (idb.objectStoreNames.contains('session')) {
                            var tx = idb.transaction('session', 'readwrite');
                            tx.objectStore('session').delete('userId');
                        }
                    } catch(err) {}
                };
                navigator.serviceWorker.ready.then(function(reg) {
                    if (reg.active) reg.active.postMessage({ type: 'LOGOUT' });
                });
            } catch(e) {}
            state.user = null;
            localStorage.removeItem('fy_auth_user');
            setView('login');
            });
        }

        function handleForceChangePassword(e) {
            e.preventDefault();
            var newPass = document.getElementById('cpass-new').value;
            var confirmPass = document.getElementById('cpass-confirm').value;
            var errEl = document.getElementById('cpass-error');
            if (newPass.length < 8) { errEl.textContent = 'كلمة المرور يجب أن تكون 8 أحرف على الأقل'; return; }
            if (newPass !== confirmPass) { errEl.textContent = 'كلمات المرور غير متطابقة'; return; }
            // Update password
            var users = DB.get('users');
            var user = users.find(function(u) { return u.id === state.user.id; });
            if (user) {
                user.password = Security.hashPassword(newPass);
                user.passwordMustChange = false;
                DB.set('users', users);

                toast('تم تغيير كلمة المرور بنجاح ✓','success');
                // Continue to dashboard
                DB.ensureUserFields(user);
                Security.createSession(user.id);
                if(user.role === 'ADMIN') setView('admin-home');
                else if(user.merchantStatus === 'APPROVED') setView('merchant-dashboard');
                else setView('user-home');
            } else {
                errEl.textContent = 'خطأ في تحديث كلمة المرور';
            }
        }

            e.preventDefault();
            var oldPass = document.getElementById('sett-old-pass').value;
            var newPass = document.getElementById('sett-new-pass').value;
            var confirmPass = document.getElementById('sett-confirm-pass').value;
            if (!oldPass || !newPass || !confirmPass) { toast('أدخل جميع الحقول','error'); return; }
            if (newPass.length < 8) { toast('كلمة المرور الجديدة يجب أن تكون 8 أحرف على الأقل','error'); return; }
            if (newPass !== confirmPass) { toast('كلمات المرور الجديدة غير متطابقة','error'); return; }

            var user = users.find(function(u) { return u.id === state.user.id; });
            if (!user) { toast('خطأ في العثور على المستخدم','error'); return; }
            // Check old password (support both hashed and plain during migration)
            var oldMatch = Security.checkPassword(oldPass, user.password) || oldPass === user.password;
            if (!oldMatch) { toast('كلمة المرور الحالية غير صحيحة','error'); return; }
            user.password = Security.hashPassword(newPass);
            user.passwordMustChange = false;
            DB.set('users', users);

            closeModal();

            // === OTP Verification Check (based on reg method) ===
            if (_regMethod === 'email') {
                if (!regEmail) { toast('أدخل البريد الإلكتروني','error'); return; }
                if (!_otpEmailVerified) { toast('تحقق من البريد الإلكتروني عبر رمز التحقق أولاً', 'error', false); return; }
                if (_otpEmail !== regEmail.toLowerCase()) { toast('البريد تم تغييره - أعد إرسال رمز التحقق', 'warning', false); _otpEmailVerified = false; return; }
            } else {
                if (!phoneVal) { toast('أدخل رقم الهاتف','error'); return; }
                if (!_smsPhoneVerified) { toast('تحقق من رقم الهاتف عبر رمز SMS أولاً', 'error', false); return; }
            }
            var users = DB.get('users');
            // Check duplicates based on method
            if (_regMethod === 'email') {
                if(users.find(function(u){ return (u.email||'').toLowerCase() === regEmail.toLowerCase(); })) { toast('البريد الإلكتروني مسجل مسبقاً','error'); return; }
            } else {
                if(users.find(function(u){var up=u.phone||'';var us=up.replace(u.countryCode||'','');return up===fullPhone||us===phoneVal;})) { toast('رقم الهاتف مسجل مسبقاً','error'); return; }
            }
            var referredBy = null;
            if(refCode) { var ref = users.find(function(u){return u.affiliateCode===refCode && u.affiliateStatus==='APPROVED';}); if(ref) referredBy = ref.id; else toast('كود الإحالة غير صحيح','warning'); }
            var role = selectedRole;
            var merchantStatus = role === 'MERCHANT' ? 'APPROVED' : 'NONE';
            var userEmail = _regMethod === 'email' ? regEmail : '';
            var userPhone = _regMethod === 'phone' ? fullPhone : '';
            var userCC = _regMethod === 'phone' ? cc : '';
            var user = {id:DB.uid(),email:userEmail,name:name,password:Security.hashPassword(pass),phone:userPhone,countryCode:userCC,role:role,usdtBalance:0,localBalance:0,affiliateBalance:0,isBlocked:false,kycStatus:'NOT_SUBMITTED',affiliateStatus:'NONE',affiliateCode:null,referredBy:referredBy,pendingEmail:null,merchantStatus:merchantStatus,createdAt:new Date().toISOString()};
            users.push(user); DB.set('users',users);
            // Reset OTP state after registration
            _otpCode = '';
            _otpEmailVerified = false;
            _otpEmail = '';
            if (_otpTimer) clearInterval(_otpTimer);
            _smsPhoneVerified = false;
            _smsConfirmationResult = null;

        function onDepPmChange() {
            var sel = document.getElementById('dep-pm');
            if(!sel) return;
            state.depPmId = sel.value;
            clearFieldImage('depReceipt');
            // Get current PM - could be admin or merchant method
            var pm = null;
            var merchantSelect = document.getElementById('dep-merchant');
            var merchantId = merchantSelect ? merchantSelect.value : '';
            if(merchantId) {
                // It's a merchant method
                var mMethods = getMerchantMethods(merchantId);
                pm = mMethods.find(function(p){return p.id===state.depPmId;});
            } else {
                // It's an admin method
                pm = DB.get('paymentMethods').find(function(p){return p.id===state.depPmId;});
            }
            var isCrypto = pm && pm.type === 'CRYPTO';
            var curRow = document.getElementById('dep-currency-row');
            var cryptoRow = document.getElementById('dep-amount-crypto-row');
            if(curRow) curRow.classList.toggle('hidden', !!isCrypto);
            if(cryptoRow) cryptoRow.classList.toggle('hidden', !isCrypto);
            // Auto-select currency based on payment method's currency
            if(!isCrypto && pm && pm.currency) {
                var curSel = document.getElementById('dep-currency');
                if(curSel) curSel.value = pm.currency;
            }
            renderDepPmDetails();
            updateDepRateInfo();
        }

        function updateDepRateInfo() {
            var el = document.getElementById('dep-rate-info');
            if(!el) return;
            var C = getThemeColors();
            var pm = getCurrentDepPm();
            if(!pm || pm.type === 'CRYPTO') {
                el.innerHTML = '';
                return;
            }
            var curSel = document.getElementById('dep-currency');
            var cur = curSel ? curSel.value : 'YER';
            var rate;
            if(cur === 'SAR') {
                var yerRate = parseFloat(DB.getSetting('exchange_rate')) || 535;
                var sarCrossRate = parseFloat(DB.getSetting('exchange_rate_sar')) || 137.50;
                rate = yerRate / sarCrossRate;
            } else {
                rate = parseFloat(DB.getSetting('exchange_rate')) || 535;
            }
            var flag = cur === 'SAR' ? '🇸🇦' : '🇾🇪';
            el.innerHTML = '<div class="'+C.card+' rounded-xl p-3 border '+C.border+' flex items-center justify-between"><span class="text-xs '+C.muted+'">'+flag+' سعر الصرف: 1 USDT = '+fmtNum(rate,2)+' '+cur+'</span></div>';
        }

        function getCurrentDepPm() {
            var pmId = state.depPmId || (document.getElementById('dep-pm') ? document.getElementById('dep-pm').value : '');
            if(!pmId) return null;
            var merchantSelect = document.getElementById('dep-merchant');
            var merchantId = merchantSelect ? merchantSelect.value : '';
            if(merchantId) {
                var mMethods = getMerchantMethods(merchantId);
                return mMethods.find(function(p){return p.id===pmId;});
            }
            return DB.get('paymentMethods').find(function(p){return p.id===pmId;});
        }

            } else {
                rate = parseFloat(DB.getSetting('exchange_rate')) || 535;

            if(!pmId) { toast('اختر طريقة الإيداع','error'); return; }
            if(!amount || amount <= 0) { toast('أدخل مبلغاً صحيحاً','error'); return; }

                var depUsdtEst = isCrypto ? amount : amount / rate;

        function submitKYC() {
            var user = getUser();
            var front = getFieldImage('kycFront');
            var back = getFieldImage('kycBack');
            var selfie = getFieldImage('kycSelfie');
            if(!front || !back || !selfie) { toast('يجب رفع جميع الصور','error'); return; }
            var docs = DB.get('kycDocuments');
            var existing = docs.findIndex(function(k){return k.userId===user.id;});
            var doc = {id:existing>=0?docs[existing].id:DB.uid(),userId:user.id,frontId:front,backId:back,selfieWithId:selfie,status:'PENDING',rejectReason:'',createdAt:new Date().toISOString()};
            if(existing>=0) docs[existing] = doc; else docs.unshift(doc);
            DB.set('kycDocuments', docs);
            var users = DB.get('users');
            var u = users.find(function(x){return x.id===user.id;});
            if(u) { u.kycStatus = 'PENDING'; DB.set('users', users); }
            clearFieldImage('kycFront'); clearFieldImage('kycBack'); clearFieldImage('kycSelfie');
            toast('تم إرسال طلب التوثيق','success');
            addNotif(user.id,'طلب توثيق','تم إرسال طلب توثيق الهوية بنجاح','INFO');
            render();
        }

        function saveUserReceiptProof(wdId) {
            var proofImg = getFieldImage('userReceiptProof');
            if(!proofImg) { toast('يجب رفع لقطة الإثبات أولاً','error'); return; }
            closeModal();
            var withdrawals = DB.get('withdrawals');
            var w = withdrawals.find(function(x){return x.id===wdId;});
            if(!w) return;
            w.userReceiptProof = proofImg;
            w.userConfirmedAt = new Date().toISOString();
            DB.set('withdrawals', withdrawals);
            addNotif(w.userId, 'تأكيد إيصال', 'تم تأكيد إيصال سحب بمبلغ '+fmtNum(w.net||0)+' USDT مع إثبات من المستخدم', 'WITHDRAW');
            // Notify admin
            var admins = DB.get('users').filter(function(u){return u.role==='ADMIN';});
            admins.forEach(function(admin){
                var userName = getUser().name;
                addNotif(admin.id, 'تأكيد إيصال من مستخدم', userName+' أكد إيصال سحب '+fmtNum(w.net||0)+' USDT', 'WITHDRAW');
            });
            // Notify merchant if exists
            if(w.assignedMerchantId) {
                var merch = DB.get('users').find(function(u){return u.id===w.assignedMerchantId;});
                if(merch) addNotif(merch.id, 'تأكيد إيصال من مستخدم', getUser().name+' أكد إيصال سحب '+fmtNum(w.net||0)+' USDT', 'WITHDRAW');
            }
            clearFieldImage('userReceiptProof');
            toast('تم تأكيد الإيصال بنجاح ✅','success');
            render();
        }

        function changePassword() {
            var user = getUser();
            var oldPass = document.getElementById('set-old-pass').value;
            var newPass = document.getElementById('set-new-pass').value;
            var newPass2 = document.getElementById('set-new-pass2').value;
            if(!oldPass || !newPass) { toast('أكمل جميع الحقول','error'); return; }
            if(newPass !== newPass2) { toast('كلمات المرور غير متطابقة','error'); return; }
            if(newPass.length < 8) { toast('كلمة المرور يجب أن تكون 8 أحرف على الأقل','error'); return; }
            var users = DB.get('users');
            var u = users.find(function(x){return x.id===user.id;});
            if(!u) { toast('خطأ في العثور على المستخدم','error'); return; }
            var oldMatch = Security.checkPassword(oldPass, u.password) || oldPass === u.password;
            if(!oldMatch) { toast('كلمة المرور الحالية غير صحيحة','error'); return; }
            u.password = Security.hashPassword(newPass);
            u.passwordMustChange = false;
            DB.set('users', users);
            Security.addAuditLog(user.id, 'PASSWORD_CHANGE', 'تغيير كلمة المرور من الإعدادات');
            toast('تم تغيير كلمة المرور','success');
            document.getElementById('set-old-pass').value = '';
            document.getElementById('set-new-pass').value = '';
            document.getElementById('set-new-pass2').value = '';
        }

        function requestPhoneChange() {
            var user = getUser();
            var newPhone = document.getElementById('set-new-phone').value.trim();
            var selfie = getFieldImage('phoneChangeSelfie');
            if(!newPhone || newPhone.length < 9) { toast('أدخل رقم الهاتف الجديد الصحيح','error'); return; }
            if(!selfie) { toast('يجب التقاط صورة سيلفي مع الهوية','error'); return; }
            // Check duplicate - smart matching with/without country code
            var users = DB.get('users');
            var cleanNew = newPhone.replace(/[^0-9]/g, '');
            var dup = users.find(function(u){
                if(u.id === user.id) return false;
                var up = u.phone || '';
                var cleanExisting = up.replace(/[^0-9]/g, '');
                return up === newPhone || cleanExisting === cleanNew;
            });
            if(dup) { toast('❌ رقم الهاتف مسجل مسبقاً لحساب آخر','error'); return; }
            var requests = DB.get('profileChangeRequests');
            requests.unshift({id:DB.uid(),userId:user.id,type:'CHANGE_PHONE',newValue:newPhone,selfie:selfie,status:'PENDING',createdAt:new Date().toISOString()});
            DB.set('profileChangeRequests', requests);
            clearFieldImage('phoneChangeSelfie');
            toast('تم إرسال طلب تغيير رقم الهاتف','success');
            addNotif(user.id,'طلب تغيير','تم إرسال طلب تغيير رقم الهاتف، بانتظار مراجعة الإدارة','INFO');
            render();
        }

        function submitWm() {
            var user = getUser();
            var type = document.getElementById('wm-type').value;
            var wms = DB.get('userWithdrawalMethods');
            var method = { id: DB.uid(), userId: user.id, type: type };
            if(type === 'BANK') {
                var bankName = document.getElementById('wm-bank-name').value.trim();
                var account = document.getElementById('wm-account').value.trim();
                var recipient = document.getElementById('wm-recipient').value.trim();
                var subtype = document.getElementById('wm-subtype').value;
                var currency = document.getElementById('wm-currency').value;
                if(!bankName || !account || !recipient) { toast('أكمل جميع الحقول','error'); return; }
                method.bankName = bankName; method.accountNumber = account; method.recipientName = recipient;
                method.subtype = subtype; method.currency = currency;
            } else {
                var network = document.getElementById('wm-network').value;
                var address = document.getElementById('wm-address').value.trim();
                if(!address) { toast('أدخل عنوان المحفظة','error'); return; }
                method.currencyName = 'USDT'; method.network = network; method.address = address;
            }
            method.createdAt = new Date().toISOString();
            wms.push(method);
            DB.set('userWithdrawalMethods', wms);
            toast('تم إضافة طريقة السحب','success');
            closeModal();
            render();
        }

        function renderUserChat(C) {
            var user = getUser();
            var adminUser = DB.get('users').find(function(u){return u.role==='ADMIN';});
            if(!adminUser) return '<div class="'+C.card+' rounded-2xl p-6 border '+C.border+' text-center"><p class="'+C.muted+'">لا يوجد مشرف متاح</p></div>';
            var adminId = adminUser.id;
            var messages = DB.get('messages').filter(function(m){return (m.fromId===user.id && m.toId===adminId)||(m.fromId===adminId && m.toId===user.id);});
            messages.sort(function(a,b){return new Date(a.createdAt)-new Date(b.createdAt);});
            var msgsHtml = '';
            if(messages.length===0) msgsHtml = '<p class="'+C.muted+' text-center py-8 text-sm">ابدأ المحادثة مع فريق الدعم</p>';
            else {
                messages.forEach(function(m) {
                    var isMe = m.fromId === user.id;
                    msgsHtml += '<div class="flex '+(isMe?'justify-start':'justify-end')+' mb-3">'+
                        '<div class="max-w-[75%] px-4 py-2.5 rounded-xl '+(isMe?'chat-bubble-me':'chat-bubble-other')+'"><p>'+escHtml(m.text)+'</p><p class="text-[10px] opacity-60 mt-1">'+fmtDate(m.createdAt)+'</p></div></div>';
                });
            }
            var msgsUnread = messages.filter(function(m){return m.fromId===adminId && !m.isRead;});
            if(msgsUnread.length>0) {
                var allMsgs = DB.get('messages');
                msgsUnread.forEach(function(m) {
                    var idx = allMsgs.findIndex(function(x){return x.id===m.id;});
                    if(idx>=0) allMsgs[idx].isRead = true;
                });
                DB.set('messages', allMsgs);
                // Re-render to update sidebar badge
                setTimeout(function(){ render(); }, 500);
            }
            setTimeout(function(){
                var chatBox = document.getElementById('user-chat-messages');
                if(chatBox) chatBox.scrollTop = chatBox.scrollHeight;
            }, 100);
            return '<div class="'+C.card+' rounded-xl border '+C.border+' flex flex-col" style="height:calc(100vh - 160px)">'+
                '<div class="p-4 border-b '+C.border+' flex items-center gap-3"><span class="text-2xl">💬</span><div><p class="font-bold '+C.text+'">الدعم الفني</p><p class="text-xs '+C.muted+'">فريق ForexYemeni</p></div></div>'+
                '<div id="user-chat-messages" class="flex-1 overflow-y-auto p-4 space-y-1">'+msgsHtml+'</div>'+
                '<div class="p-3 border-t '+C.border+' flex gap-2"><input type="text" id="user-chat-input" class="flex-1 px-4 py-2.5 rounded-xl border '+C.input+' outline-none text-sm" placeholder="اكتب رسالتك..." onkeydown="if(event.key===\'Enter\')sendUserChat()">'+
                '<button onclick="sendUserChat()" class="'+C.btn+' px-5 py-2.5 rounded-lg btn text-sm">إرسال</button></div></div>';
        }

        function sendUserChat() {
            var user = getUser();
            var input = document.getElementById('user-chat-input');
            if(!input) return;
            var text = input.value.trim();
            if(!text) return;
            var adminUser = DB.get('users').find(function(u){return u.role==='ADMIN';});
            if(!adminUser) { toast('لا يوجد مشرف','error'); return; }
            var msgs = DB.get('messages');
            msgs.push({id:DB.uid(),fromId:user.id,toId:adminUser.id,text:text,isRead:false,createdAt:new Date().toISOString()});
            DB.set('messages', msgs);
            addNotif(adminUser.id, '💬 رسالة جديدة', 'رسالة من ' + user.name + ': ' + text.substring(0, 50), 'CHAT');
            input.value = '';
            render();
        }

        function rateMerchant(merchantId, score) {
            var user = getUser();
            if(!user) return;
            // Show review modal
            var C = getThemeColors();
            showModal('<h3 class="text-lg font-bold '+C.text+' mb-4 text-center">⭐ تقييم التاجر</h3>'+
                '<div class="flex justify-center gap-2 mb-4" id="rating-stars-modal">'+
                [1,2,3,4,5].map(function(s){return '<span class="text-4xl cursor-pointer btn '+(s<=score?'text-warning':'text-gray-500')+'" onclick="_selectRating('+s+')">'+(s<=score?'★':'☆')+'</span>';}).join('')+
                '</div>'+
                '<input type="hidden" id="rating-score-val" value="'+score+'">'+
                '<textarea id="rating-review-text" class="w-full px-3 py-2.5 rounded-xl border '+C.input+' outline-none text-sm mb-4" rows="2" placeholder="اترك تعليقاً (اختياري)..."></textarea>'+
                '<button onclick="_submitRating(\''+merchantId+'\')" class="'+C.btn+' w-full py-2.5 rounded-lg font-bold btn">✅ إرسال التقييم</button>'+
                '<button onclick="closeModal()" class="w-full py-2 mt-2 rounded-lg border '+C.border+' '+C.text+' btn">إلغاء</button>');
        }
        var _selectedRatingScore = 0;
        window._selectRating = function(score) {
            _selectedRatingScore = score;
            var el = document.getElementById('rating-score-val');
            if(el) el.value = score;
            var stars = document.getElementById('rating-stars-modal');
            if(stars) {
                stars.innerHTML = [1,2,3,4,5].map(function(s){return '<span class="text-4xl cursor-pointer btn '+(s<=score?'text-warning':'text-gray-500')+'" onclick="_selectRating('+s+')">'+(s<=score?'★':'☆')+'</span>';}).join('');
            }
        };
        window._submitRating = function(merchantId) {
            var score = parseInt(document.getElementById('rating-score-val').value) || _selectedRatingScore;
            if(!score) { toast('اختر عدد النجوم','error'); return; }
            var review = (document.getElementById('rating-review-text').value || '').trim();
            var user = getUser();
            if(!user) return;
            var ratings = DB.get('merchantRatings');
            var existing = ratings.find(function(r){return r.merchantId===merchantId && r.userId===user.id;});
            if(existing) {
                existing.score = score;
                existing.review = review;
                existing.updatedAt = new Date().toISOString();
            } else {
                ratings.unshift({id:DB.uid(),merchantId:merchantId,userId:user.id,userName:user.name,score:score,review:review,createdAt:new Date().toISOString()});
            }
            DB.set('merchantRatings', ratings);
            closeModal();
            toast('تم تقييم التاجر: '+score+' نجوم ✓','success',false);
            render();
        };

        function confirmMerchantApproveDeposit(depId) {
            closeModal();
            var user = getUser();
            var deposits = DB.get('deposits');
            var d = deposits.find(function(x){return x.id===depId;});
            if(!d) return;
            var users = DB.get('users');
            // Check if this deposit is assigned to a merchant and verify merchant balance
            var merchantId = d.assignedMerchantId;
            if(merchantId) {
                var merch = users.find(function(x){return x.id===merchantId;});
                if(merch && (merch.usdtBalance||0) < (d.usdtAmount||0)) {
                    toast('رصيد التاجر غير كافٍ لتنفيذ هذا الإيداع','error');
                    return;
                }
            }
            d.status = 'APPROVED';
            d.processedBy = user.id;
            var u = users.find(function(x){return x.id===d.userId;});
            if(u) { u.usdtBalance = (u.usdtBalance||0) + (d.usdtAmount||0); }
            // Deduct from merchant balance
            if(merchantId) {
                var merch2 = users.find(function(x){return x.id===merchantId;});
                if(merch2) { merch2.usdtBalance = Math.max(0, (merch2.usdtBalance||0) - (d.usdtAmount||0)); }
            }
            DB.set('users', users);
            calculateAffiliateCommission(d.userId, d.usdtAmount||0);
            DB.set('deposits', deposits);
            var mTxns = DB.get('merchantTransactions');
            mTxns.unshift({id:DB.uid(),merchantId:user.id,userId:d.userId,type:'DEPOSIT',amount:d.usdtAmount,status:'APPROVED',createdAt:new Date().toISOString()});
            DB.set('merchantTransactions', mTxns);
            addLog(d.userId,'DEPOSIT_APPROVED',d.usdtAmount,'USDT','تم قبول إيداع '+fmtNum(d.usdtAmount)+' USDT');
            addNotif(d.userId,'إيداع مقبول','تم قبول إيداعك بمبلغ '+fmtNum(d.usdtAmount)+' USDT','DEPOSIT');
            toast('تم قبول الإيداع','success');
            render();
        }

        function toggleMmFields() {
            var type = document.getElementById('mm-type').value;
            var cf = document.getElementById('mm-crypto-fields');
            var bf = document.getElementById('mm-bank-fields');
            if(type === 'CRYPTO') { cf.classList.remove('hidden'); bf.classList.add('hidden'); }
            else { cf.classList.add('hidden'); bf.classList.remove('hidden'); }
        }

        function toggleMmBankSubFields() {
            var subtype = document.getElementById('mm-subtype').value;
            var wf = document.getElementById('mm-wallet-fields');
            var tf = document.getElementById('mm-transfer-fields');
            if(wf) wf.classList.toggle('hidden', subtype !== 'wallet');
            if(tf) tf.classList.toggle('hidden', subtype !== 'transfer');
        }

        function addMerchantMethod() {
            var user = getUser();
            var type = document.getElementById('mm-type').value;
            var method = {id:DB.uid(), merchantId:user.id, type:type};
            if(type === 'CRYPTO') {
                method.currencyName = document.getElementById('mm-currency-name').value.trim() || 'USDT';
                method.network = document.getElementById('mm-network').value;
                method.address = document.getElementById('mm-address').value.trim();
                if(!method.address) { toast('أدخل عنوان المحفظة','error'); return; }
            } else {
                var subtype = document.getElementById('mm-subtype').value;
                var currency = document.getElementById('mm-currency').value;
                method.subtype = subtype;
                method.currency = currency;
                if(subtype === 'wallet') {
                    method.bankName = document.getElementById('mm-bank-name').value.trim();
                    method.accountNumber = document.getElementById('mm-bank-account').value.trim();
                    method.recipientName = document.getElementById('mm-bank-recipient').value.trim();
                    if(!method.bankName || !method.accountNumber || !method.recipientName) { toast('أكمل جميع حقول المحفظة','error'); return; }
                } else {
                    method.recipientName = document.getElementById('mm-beneficiary').value.trim();
                    method.accountNumber = document.getElementById('mm-tel').value.trim();
                    method.bankName = document.getElementById('mm-net-name').value.trim();
                    if(!method.recipientName || !method.accountNumber) { toast('أكمل حقول التحويل','error'); return; }
                }
            }
            var methods = DB.get('merchantPaymentMethods') || [];
            methods.push(method);
            DB.set('merchantPaymentMethods', methods);
            closeModal();
            toast('تم إضافة طريقة الدفع','success');

            messages.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);});

            // Group messages by the OTHER person (not the merchant)
            var chatPartners = {};
            messages.forEach(function(m) {
                var otherId = m.fromId === user.id ? m.toId : m.fromId;
                if (!chatPartners[otherId]) {
                    var otherUser = allUsers.find(function(u){return u.id===otherId;});
                    chatPartners[otherId] = {
                        userId: otherId,
                        name: otherUser ? otherUser.name : 'مستخدم محذوف',
                        role: otherUser ? otherUser.role : 'UNKNOWN',
                        lastMsg: m,
                        unread: 0
                    };

                // Don't overwrite lastMsg - keep the newest (first encountered since sorted desc)

                    chatPartners[otherId].unread++;
                }
            });

            var partnerList = Object.values(chatPartners);
            partnerList.sort(function(a,b){ return new Date(b.lastMsg.createdAt) - new Date(a.lastMsg.createdAt); });

            var totalUnread = partnerList.reduce(function(s,p){return s+p.unread;},0);

                        });
                    }
                    // Mark as read
                    var unreadMsgs = chatMsgs.filter(function(m){return m.fromId===state.merchantChatWithId && !m.isRead;});
                    if(unreadMsgs.length>0) {
                        var allMsgs = DB.get('messages');

        function exportTransactionsCSV(userId) {
            var deposits, withdrawals, all = [];
            var users = DB.get('users');
            if(userId) {
                deposits = DB.get('deposits').filter(function(d){return d.userId===userId;});
                withdrawals = DB.get('withdrawals').filter(function(w){return w.userId===userId;});
            } else {
                deposits = DB.get('deposits');
                withdrawals = DB.get('withdrawals');
            }
            deposits.forEach(function(d){
                var u = users.find(function(x){return x.id===d.userId;});
                all.push({date:d.createdAt||'',type:'إيداع',amount:d.amount||0,currency:d.currency||'USDT',status:d.status,user:u?u.name:'مستخدم'});
            });
            withdrawals.forEach(function(w){
                var u = users.find(function(x){return x.id===w.userId;});
                all.push({date:w.createdAt||'',type:'سحب',amount:w.localAmount||w.net||0,currency:w.currency||'USDT',status:w.status,user:u?u.name:'مستخدم'});
            });
            all.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
            var statusMap = {PENDING:'معلق',APPROVED:'موافق',COMPLETED:'مكتمل',REJECTED:'مرفوض',PROCESSING:'قيد المعالجة',RECEIVED:'مستلم'};
            var csv = '\uFEFF' + 'التاريخ,النوع,المبلغ,العملة,الحالة,المستخدم\n';
            all.forEach(function(item){
                csv += '"' + fmtDate(item.date) + '","' + item.type + '","' + fmtNum(item.amount) + '","' + item.currency + '","' + (statusMap[item.status]||item.status) + '","' + (item.user||'') + '"\n';
            });
            var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url; a.download = 'transactions_' + new Date().toISOString().split('T')[0] + '.csv';
            a.click(); URL.revokeObjectURL(url);
            toast('تم تصدير المعاملات بنجاح','success');
        }

                var detectedCC = '';
                var countries2 = [{code:'+967',len:12},{code:'+966',len:12},{code:'+971',len:12},{code:'+968',len:11},{code:'+974',len:11},{code:'+965',len:11},{code:'+973',len:11},{code:'+20',len:13},{code:'+962',len:12},{code:'+961',len:11},{code:'+964',len:13}];
                for(var ci = 0; ci < countries2.length; ci++) {
                    if(newPhone.indexOf(countries2[ci].code) === 0) { detectedCC = countries2[ci].code; break; }
                }
                if(detectedCC) u.countryCode = detectedCC;
                // Check duplicate phone
                var dupPhone = users.find(function(x){ return x.id !== userId && x.phone === newPhone; });

        function calculateAffiliateCommission(userId, amount) {
            var users = DB.get('users');
            var user = users.find(function(u){return u.id === userId;});
            if(!user || !user.referredBy) return;
            // Level 1
            var ref1 = users.find(function(u){return u.id === user.referredBy;});
            if(!ref1 || ref1.affiliateStatus !== 'APPROVED') return;
            var l1Pct = parseFloat(DB.getSetting('aff_l1')) || 5;
            var l1Comm = amount * l1Pct / 100;
            ref1.affiliateBalance = (ref1.affiliateBalance || 0) + l1Comm;
            addLog(ref1.id, 'AFFILIATE_EARNING', l1Comm, 'USDT', 'عمولة مستوى 1 من ' + (user.name || 'مستخدم'));
            addNotif(ref1.id, 'عمولة جديدة', 'حصلت على ' + fmtNum(l1Comm) + ' USDT عمولة مستوى 1', 'AFFILIATE');
            // Level 2
            var l2Pct = parseFloat(DB.getSetting('aff_l2')) || 3;
            if(l2Pct > 0 && ref1.referredBy) {
                var ref2 = users.find(function(u){return u.id === ref1.referredBy;});
                if(ref2 && ref2.affiliateStatus === 'APPROVED') {
                    var l2Comm = amount * l2Pct / 100;
                    ref2.affiliateBalance = (ref2.affiliateBalance || 0) + l2Comm;
                    addLog(ref2.id, 'AFFILIATE_EARNING', l2Comm, 'USDT', 'عمولة مستوى 2 من ' + (user.name || 'مستخدم'));
                    addNotif(ref2.id, 'عمولة جديدة', 'حصلت على ' + fmtNum(l2Comm) + ' USDT عمولة مستوى 2', 'AFFILIATE');
                    // Level 3
                    var l3Pct = parseFloat(DB.getSetting('aff_l3')) || 1;
                    if(l3Pct > 0 && ref2.referredBy) {
                        var ref3 = users.find(function(u){return u.id === ref2.referredBy;});
                        if(ref3 && ref3.affiliateStatus === 'APPROVED') {
                            var l3Comm = amount * l3Pct / 100;
                            ref3.affiliateBalance = (ref3.affiliateBalance || 0) + l3Comm;
                            addLog(ref3.id, 'AFFILIATE_EARNING', l3Comm, 'USDT', 'عمولة مستوى 3 من ' + (user.name || 'مستخدم'));
                            addNotif(ref3.id, 'عمولة جديدة', 'حصلت على ' + fmtNum(l3Comm) + ' USDT عمولة مستوى 3', 'AFFILIATE');
                        }
                    }
                }
            }
            DB.set('users', users);
        }

                            '<div class="flex items-center justify-between py-1"><span class="text-xs '+C.muted+'">رقم الحساب:</span><div class="flex items-center gap-1"><span class="text-xs font-mono font-bold '+C.text+'">'+bnkAddr+'</span><button onclick="copyText(\''+bnkAddr.replace(/'/g,"\\'")+'\')" class="copy-btn">📋</button></div></div>'+

                            (method.subtype?'<div class="flex items-center justify-between py-1"><span class="text-xs '+C.muted+'">نوع الحساب:</span><span class="text-xs font-medium '+C.text+'">'+escHtml(method.subtype)+'</span></div>':'')+
                            '</div>';

                            '<p class="text-xs font-bold '+C.text+'">💳 تفاصيل المحفظة الرقمية:</p>'+
                            '<div class="flex items-center justify-between py-1"><span class="text-xs '+C.muted+'">الشبكة:</span><span class="text-xs font-medium '+C.text+'">'+escHtml(method.network||'—')+'</span></div>'+
                            '<div class="py-1"><div class="flex items-center justify-between mb-1"><span class="text-xs '+C.muted+'">العنوان:</span><button onclick="copyText(\''+cryptoAddr.replace(/'/g,"\\'")+'\')" class="copy-btn">📋 نسخ</button></div><p class="font-mono text-xs '+C.text+' break-all rounded p-2 border '+C.border+'">'+cryptoAddr+'</p></div>'+
                            (method.currencyName?'<div class="flex items-center justify-between py-1"><span class="text-xs '+C.muted+'">العملة:</span><span class="text-xs font-medium text-primary">'+escHtml(method.currencyName)+'</span></div>':'')+
                            '</div>';
                    }
                }
                var processedBy = '';

                    if(processor) processedBy = '<span class="text-xs '+C.muted+'"> بواسطة: '+escHtml(processor.name)+'</span>';
                }
                var assignedMerchantName = '';
                if(w.assignedMerchantId) {
                    var assignedM = users.find(function(m){return m.id===w.assignedMerchantId;});
                    if(assignedM) assignedMerchantName = escHtml(assignedM.name);

                return '<div class="p-4 rounded-lg border '+C.border+'">'+

                    '<div><p class="font-medium text-sm '+C.text+'">'+escHtml(u?u.name:'مستخدم محذوف')+'</p><p class="text-xs '+C.muted+'">'+fmtDate(w.createdAt)+'</p></div>'+
                    '<div class="text-left">'+statusBadge(w.status)+processedBy+'</div></div>'+
                    '<div class="grid grid-cols-3 gap-2 text-xs mb-3">'+
                    '<div class="'+C.card+' rounded p-2"><p class="'+C.muted+'">المبلغ</p><p class="font-bold text-danger">'+fmtNum(w.amount)+'</p><p class="text-xs '+C.muted+'">'+(w.currency||'USDT')+'</p></div>'+

                    (w.status==='RECEIVED'?'<div class="flex gap-2"><button onclick="adminStartProcessing(\''+w.id+'\')" class="flex-1 py-2 rounded-lg font-bold btn bg-warning text-dark-bg text-sm">✅ تمت الموافقة وخصم الرصيد</button><button onclick="adminRejectWithdrawal(\''+w.id+'\')" class="flex-1 py-2 rounded-xl font-bold btn btn-premium bg-gradient-to-r from-red-500 to-rose-500 text-white text-sm">❌ رفض</button></div>':'')+
                    (w.status==='PROCESSING'?'<div class="flex gap-2"><button onclick="adminApproveWithdrawal(\''+w.id+'\')" class="flex-1 py-2 rounded-xl font-bold btn btn-premium bg-gradient-to-r from-emerald-500 to-green-500 text-dark-bg text-sm">📸 رفع إثبات التنفيذ (اجباري)</button></div>':'')+

        function filterAdminWithdrawals(status) {
            var withdrawals = DB.get('withdrawals');
            withdrawals.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);});
            var C = getThemeColors();
            document.getElementById('admin-withdrawals-list').innerHTML = renderAdminWithdrawalsList(withdrawals, C, status);
        }

        function adminReceiveWithdrawal(wdId) {
            showConfirm('📋','استلام طلب السحب','هل تم استلام طلب السحب؟','نعم، تم الاستلام','bg-info text-white',function(yes){
                if(!yes) return;
                var withdrawals = DB.get('withdrawals');
                var w = withdrawals.find(function(x){return x.id===wdId;});
                if(!w) return;
                w.status = 'RECEIVED';
                var adminUser = getUser();
                w.processedBy = adminUser ? adminUser.id : null;
                w.receivedAt = new Date().toISOString();
                DB.set('withdrawals', withdrawals);
                addNotif(w.userId,'تم استلام طلب السحب','تم استلام طلب سحبك بمبلغ '+fmtNum(w.net||0)+' USDT وجاري المراجعة.','INFO');
                toast('تم تأكيد استلام الطلب','success');
                render();
            });
        }

        function adminStartProcessing(wdId) {
            var withdrawals = DB.get('withdrawals');
            var w = withdrawals.find(function(x){return x.id===wdId;});
            if(!w) return;
            showConfirm('✅','موافقة على السحب وخصم الرصيد','سيتم خصم '+fmtNum(w.amount||0)+' USDT من رصيد المستخدم وإرسال إشعار له. متابعة؟','نعم، موافقة','bg-success text-dark-bg',function(yes){
                if(!yes) return;
                var withdrawals = DB.get('withdrawals');
                var w = withdrawals.find(function(x){return x.id===wdId;});
                if(!w) return;
                w.status = 'PROCESSING';
                var adminUser = getUser();
                w.processedBy = adminUser ? adminUser.id : w.processedBy;
                w.approvedAt = new Date().toISOString();
                var users = DB.get('users');
                var u = users.find(function(x){return x.id===w.userId;});
                if(u) { u.usdtBalance = Math.max(0, (u.usdtBalance||0) - (w.amount||0)); DB.set('users', users); }
                DB.set('withdrawals', withdrawals);
                addNotif(w.userId,'تمت الموافقة على السحب','تمت الموافقة على سحبك بمبلغ '+fmtNum(w.net||0)+' USDT. بانتظار رفع إثبات التنفيذ.','WITHDRAW');
                toast('تمت الموافقة - يجب رفع لقطة إثبات التنفيذ','success');
                render();
            });
        }

        function adminApproveWithdrawal(wdId) {
            var C = getThemeColors();
            showModal('<h3 class="text-lg font-bold '+C.text+' mb-4">📸 رفع لقطة إثبات التنفيذ (اجباري)</h3>'+
                '<p class="'+C.muted+' text-sm mb-4">ارفع لقطة شاشة تثبت إتمام التحويل إلى حساب المستخدم</p>'+
                '<div id="admin-wd-proof-preview"></div>'+
                '<div class="flex gap-2 mb-4">'+
                '<button type="button" onclick="captureForField(\'adminWdProof\');showImagePreviewAfterCapture(\'adminWdProof\',\'admin-wd-proof-preview\')" class="flex-1 px-4 py-3 rounded-lg border '+C.border+' '+C.text+' btn text-sm font-medium">📸 كاميرا</button>'+
                '<label class="flex-1 px-4 py-3 rounded-lg border '+C.border+' '+C.text+' btn text-sm font-medium text-center cursor-pointer">📁 رفع ملف<input type="file" accept="image/*" class="hidden" onchange="fileForFieldWithPreview(\'adminWdProof\',this,\'admin-wd-proof-preview\')"></label>'+
                '</div>'+
                '<div id="admin-wd-proof-actions" class="hidden">'+
                '<button onclick="confirmAdminWdApprove(\''+wdId+'\')" class="'+C.btn+' w-full py-3 rounded-lg font-bold btn text-lg">✅ تأكيد ورفع الإثبات</button>'+
                '</div>'+
                '<button onclick="closeModal()" class="w-full py-2.5 rounded-lg border '+C.border+' '+C.text+' btn mt-2">إلغاء</button>');
        }

        function confirmAdminWdApprove(wdId) {
            var proofImg = getFieldImage('adminWdProof');
            if(!proofImg) { toast('يجب رفع لقطة الإثبات أولاً','error'); return; }
            closeModal();
            var withdrawals = DB.get('withdrawals');
            var w = withdrawals.find(function(x){return x.id===wdId;});
            if(!w) return;
            w.status = 'APPROVED';
            w.confirmScreenshot = proofImg;
            var adminUser = getUser();
            w.processedBy = adminUser ? adminUser.id : w.processedBy;
            w.completedAt = new Date().toISOString();
            DB.set('withdrawals', withdrawals);
            addLog(w.userId,'WITHDRAW_APPROVED',w.net,'USDT','تم إكمال سحب '+fmtNum(w.net)+' USDT مع إثبات التنفيذ');
            addNotif(w.userId,'سحب مكتمل','تم إكمال سحبك بمبلغ '+fmtNum(w.net)+' USDT. تم رفع إثبات التنفيذ.','WITHDRAW');
            clearFieldImage('adminWdProof');
            toast('تم رفع الإثبات وإكمال السحب','success');
            render();
        }

        function adminRejectWithdrawal(wdId) {
            var C = getThemeColors();
            showModal('<h3 class="text-lg font-bold '+C.text+' mb-4">❌ رفض السحب</h3>'+
                '<div class="space-y-3">'+
                '<p class="text-sm '+C.muted+'">سيتم استرداد الرصيد للمستخدم. اكتب سبب الرفض:</p>'+
                '<textarea id="admin-wd-reject-reason" class="w-full px-4 py-2.5 rounded-xl border '+C.input+' outline-none h-24" placeholder="سبب الرفض..."></textarea>'+
                '<button onclick="confirmAdminWdReject(\''+wdId+'\')" class="w-full py-3 rounded-xl font-bold btn btn-premium bg-gradient-to-r from-red-500 to-rose-500 text-white">تأكيد الرفض</button>'+
                '<button onclick="closeModal()" class="w-full py-2.5 rounded-lg border '+C.border+' '+C.text+' btn">إلغاء</button></div>');
        }

        function confirmAdminWdReject(wdId) {
            var reason = document.getElementById('admin-wd-reject-reason').value.trim();
            if(!reason) { toast('يجب كتابة سبب الرفض','error'); return; }
            closeModal();
            var withdrawals = DB.get('withdrawals');
            var w = withdrawals.find(function(x){return x.id===wdId;});
            if(!w) return;
            w.status = 'REJECTED';
            w.rejectReason = reason;
            var users = DB.get('users');
            var u = users.find(function(x){return x.id===w.userId;});
            if(u) { u.usdtBalance = (u.usdtBalance||0) + (w.amount||0); DB.set('users', users); }
            DB.set('withdrawals', withdrawals);
            addLog(w.userId,'WITHDRAW_REJECTED',w.amount,'USDT','تم رفض السحب واسترداد '+fmtNum(w.amount)+' USDT. السبب: '+reason);
            addNotif(w.userId,'سحب مرفوض','تم رفض سحبك. تم استرداد المبلغ. السبب: '+reason,'WITHDRAW');
            toast('تم رفض السحب واسترداد الرصيد','success');
            render();
        }

        // ==================== DYNAMIC IMAGE MODAL ====================
        function showDynamicImageModal(id, collection) {
            var imgSrc = '';
            if(collection === 'deposit') { var d = DB.get('deposits').find(function(x){return x.id===id;}); if(d) imgSrc = d.receipt; }
            else if(collection === 'kyc-front') { var k = DB.get('kycDocuments').find(function(x){return x.id===id;}); if(k) imgSrc = k.frontId; }
            else if(collection === 'kyc-back') { var k2 = DB.get('kycDocuments').find(function(x){return x.id===id;}); if(k2) imgSrc = k2.backId; }
            else if(collection === 'kyc-selfie') { var k3 = DB.get('kycDocuments').find(function(x){return x.id===id;}); if(k3) imgSrc = k3.selfieWithId; }
            else if(collection === 'kyc-address') { var ka = DB.get('kycDocuments').find(function(x){return x.id===id;}); if(ka) imgSrc = ka.proofOfAddress; }
            else if(collection === 'merch-front') { var m1 = DB.get('merchantRequests').find(function(x){return x.id===id;}); if(m1) imgSrc = m1.frontId; }
            else if(collection === 'merch-back') { var m2 = DB.get('merchantRequests').find(function(x){return x.id===id;}); if(m2) imgSrc = m2.backId; }
            else if(collection === 'merch-selfie') { var m3 = DB.get('merchantRequests').find(function(x){return x.id===id;}); if(m3) imgSrc = m3.selfieWithId; }
            else if(collection === 'merch-address') { var m4 = DB.get('merchantRequests').find(function(x){return x.id===id;}); if(m4) imgSrc = m4.proofOfAddress; }
            if(imgSrc) showImageModal(imgSrc);
        }
        // ==================== ADMIN: KYC ====================
        function renderAdminKYC(C) {
            var docs = DB.get('kycDocuments');
            var pending = docs.filter(function(k){return k.status==='PENDING';});
            var approved = docs.filter(function(k){return k.status==='APPROVED';});
            var rejected = docs.filter(function(k){return k.status==='REJECTED';});
            var total = docs.length;

            function renderKycCard(k, C, showActions) {
                var u = DB.get('users').find(function(x){return x.id===k.userId;});
                if(!u) return '';
                var isMerchant = u.role === 'MERCHANT';
                var roleLabel = isMerchant ? '<span class="px-2 py-0.5 rounded-full bg-primary/20 text-primary text-[10px] font-bold">🏪 تاجر</span>' : '<span class="px-2 py-0.5 rounded-full bg-info/20 text-info text-[10px] font-bold">👤 مستخدم</span>';
                var addressImg = k.proofOfAddress ? '<div><p class="text-xs '+C.muted+' mb-1">🏠 إثبات العنوان</p><img src="'+k.proofOfAddress+'" class="h-32 rounded-lg border cursor-pointer object-cover" onclick="showDynamicImageModal(\''+k.id+'\',\'kyc-address\')"></div>' : '';
                var gridCols = k.proofOfAddress ? 'grid grid-cols-2 md:grid-cols-4 gap-3' : 'grid grid-cols-3 gap-3';
                var rejectReasonHtml = k.status==='REJECTED' && k.rejectReason ? '<div class="mt-3 p-2 rounded-lg bg-danger/10 border border-danger/30"><p class="text-xs text-danger font-bold">❌ سبب الرفض: '+escHtml(k.rejectReason)+'</p></div>' : '';
                var statusBadgeHtml = statusBadge(k.status);
                var actionsHtml = '';
                if(showActions) {
                    actionsHtml = '<div class="flex gap-2 mt-3"><button onclick="approveKYC(\''+k.id+'\')" class="flex-1 py-2 rounded-xl font-bold btn bg-gradient-to-r from-emerald-500 to-green-500 text-dark-bg text-sm">✅ قبول</button><button onclick="rejectKYC(\''+k.id+'\')" class="flex-1 py-2 rounded-xl font-bold btn bg-gradient-to-r from-red-500 to-rose-500 text-white text-sm">❌ رفض</button></div>';
                }
                return '<div class="p-4 rounded-xl border '+C.border+' bg-gradient-to-br '+C.card+'">'+
                    '<div class="flex items-center justify-between mb-2"><div class="flex items-center gap-2"><p class="font-bold text-sm '+C.text+'">'+escHtml(u.name)+'</p>'+roleLabel+'</div>'+statusBadgeHtml+'</div>'+
                    '<div class="flex items-center gap-4 mb-3 text-xs '+C.muted+'"><span>📱 '+escHtml(u.phone||'غير مضاف')+'</span>'+(u.email?'<span>✉️ '+escHtml(u.email)+'</span>':'')+'<span>📅 '+fmtDate(k.createdAt)+'</span></div>'+
                    '<div class="'+gridCols+' mb-2">'+
                    '<div><p class="text-xs '+C.muted+' mb-1">📄 الوجه الأمامي</p><img src="'+k.frontId+'" class="h-28 w-full rounded-lg border cursor-pointer object-cover" onclick="showDynamicImageModal(\''+k.id+'\',\'kyc-front\')"></div>'+
                    '<div><p class="text-xs '+C.muted+' mb-1">📄 الوجه الخلفي</p><img src="'+k.backId+'" class="h-28 w-full rounded-lg border cursor-pointer object-cover" onclick="showDynamicImageModal(\''+k.id+'\',\'kyc-back\')"></div>'+
                    '<div><p class="text-xs '+C.muted+' mb-1">🤳 سيلفي مع الهوية</p><img src="'+k.selfieWithId+'" class="h-28 w-full rounded-lg border cursor-pointer object-cover" onclick="showDynamicImageModal(\''+k.id+'\',\'kyc-selfie\')"></div>'+
                    addressImg+
                    '</div>'+rejectReasonHtml+actionsHtml+'</div>';
            }

            var pendingHtml = pending.length===0 ? '<p class="'+C.muted+' text-center py-8">لا توجد طلبات معلقة</p>' : '<div class="space-y-4">'+pending.map(function(k){return renderKycCard(k,C,true);}).join('')+'</div>';
            var approvedHtml = approved.length===0 ? '<p class="'+C.muted+' text-center py-8">لا يوجد موثقين</p>' : '<div class="space-y-4">'+approved.map(function(k){return renderKycCard(k,C,false);}).join('')+'</div>';
            var rejectedHtml = rejected.length===0 ? '<p class="'+C.muted+' text-center py-8">لا يوجد مرفوضين</p>' : '<div class="space-y-4">'+rejected.map(function(k){return renderKycCard(k,C,false);}).join('')+'</div>';

            return '<div class="'+C.card+' rounded-2xl p-6 border '+C.border+'">'+
                '<h2 class="text-xl font-bold '+C.text+' mb-2 text-center">🪪 توثيق الهوية</h2>'+
                '<p class="'+C.muted+' text-xs text-center mb-4">إجمالي الطلبات: '+total+'</p>'+
                '<div class="grid grid-cols-3 gap-2 mb-6">'+
                '<button onclick="showKycTab(\'pending\')" id="kyc-tab-pending" class="py-3 rounded-xl font-bold btn text-sm bg-gradient-to-r from-amber-500 to-yellow-500 text-dark-bg border-0 shadow-lg">⏳ معلق ('+pending.length+')</button>'+
                '<button onclick="showKycTab(\'approved\')" id="kyc-tab-approved" class="py-3 rounded-xl font-bold btn text-sm border '+C.border+' '+C.text+'">✅ موافق عليهم ('+approved.length+')</button>'+
                '<button onclick="showKycTab(\'rejected\')" id="kyc-tab-rejected" class="py-3 rounded-xl font-bold btn text-sm border '+C.border+' '+C.text+'">❌ مرفوضين ('+rejected.length+')</button></div>'+

        function renderAdminChat(C) {
            var adminUser = DB.get('users').find(function(u){return u.role==='ADMIN';});
            var adminId = adminUser ? adminUser.id : 'admin1';
            var allUsers = DB.get('users').filter(function(u){return u.role !== 'ADMIN';});
            var messages = DB.get('messages');
            // Set default chat user
            if(!state.activeChatUserId && allUsers.length > 0) {
                state.activeChatUserId = allUsers[0].id;
            }
            var chatUserId = state.activeChatUserId;
            var chatUser = allUsers.find(function(u){return u.id===chatUserId;});
            // Build user selector with unread counts
            var userOpts = allUsers.map(function(u) {
                var unread = messages.filter(function(m){return m.fromId===u.id && m.toId===adminId && !m.isRead;}).length;
                var isMerch = u.role === 'MERCHANT';
                var label = (isMerch?'🏪 ':'👤 ')+escHtml(u.name)+(unread>0?' ('+unread+' جديد)':'');
                return '<option value="'+u.id+'" '+(chatUserId===u.id?'selected':'')+'>'+label+'</option>';
            }).join('');
            // Get messages for selected user
            var chatMsgs = [];
            if(chatUserId) {
                chatMsgs = messages.filter(function(m){return (m.fromId===chatUserId&&m.toId===adminId)||(m.fromId===adminId&&m.toId===chatUserId);}).sort(function(a,b){return new Date(a.createdAt)-new Date(b.createdAt);});
                // Mark messages from this user as read
                var unreadAdmin = chatMsgs.filter(function(m){return m.fromId===chatUserId && !m.isRead;});
                if(unreadAdmin.length>0) {
                    var allMsgs = DB.get('messages');
                    unreadAdmin.forEach(function(m) {
                        var idx = allMsgs.findIndex(function(x){return x.id===m.id;});
                        if(idx>=0) allMsgs[idx].isRead = true;
                    });
                    DB.set('messages', allMsgs);
                }
            }
            var msgsHtml = '';
            if(!chatUser) msgsHtml = '<p class="'+C.muted+' text-center py-8">لا يوجد مستخدمين</p>';

        function saveAdminMerchantCommission(merchantId) {
            var users = DB.get('users');
            var m = users.find(function(x){return x.id===merchantId;});
            if(!m) return;
            var allData = DB.get('merchantPaymentData');
            var mData = allData[merchantId] || {};
            if(mData.dailyAdminCommission !== undefined && mData.dailyAdminCommission !== '' && mData.dailyAdminCommission > 0) {
                toast('⚠️ لا يمكن تعديل العمولة بعد تحديدها. حذف التاجر وأعد إنشائه لتغييرها.','error');
                return;
            }
            var percent = parseFloat(document.getElementById('admin-comm-percent').value);
            if(!percent || percent <= 0 || percent > 100) { toast('أدخل نسبة صحيحة (0.1 - 100)','error'); return; }
            if(!allData || typeof allData !== 'object') allData = {};
            if(!allData[merchantId]) allData[merchantId] = {};
            allData[merchantId].dailyAdminCommission = percent;
            allData[merchantId].updatedAt = new Date().toISOString();
            DB.set('merchantPaymentData', allData);
            addNotif(merchantId,'تحديد عمولة','تم تحديد عمولة '+percent+'% يومية على معاملاتك من الإدارة. لا يمكن تغييرها إلا بحذف حسابك وإعادة إنشائه.','WARNING');
            closeModal(); toast('تم تحديد العمولة: '+percent+'% - لا يمكن تعديلها','success');
            render();
        }

        function executeDailyAdminCommissions() {
            var users = DB.get('users');
            var allData = DB.get('merchantPaymentData');
            if(!allData || typeof allData !== 'object') return;
            var merchants = users.filter(function(u){return u.role==='MERCHANT' && !u.isBlocked;});
            var totalCollected = 0;
            merchants.forEach(function(m) {
                var mData = allData[m.id] || {};
                var commPercent = mData.dailyAdminCommission || 0;
                if(commPercent <= 0) return;
                var mTxns = DB.get('merchantTransactions').filter(function(t){return t.merchantId===m.id && t.status==='APPROVED';});
                var today = new Date().toISOString().split('T')[0];
                var todayTxns = mTxns.filter(function(t){return (t.createdAt||'').split('T')[0] === today;});
                var todayVolume = todayTxns.reduce(function(s,t){return s+(t.amount||0);},0);
                if(todayVolume <= 0) return;
                var commAmount = todayVolume * commPercent / 100;
                if(commAmount <= 0 || commAmount > (m.usdtBalance||0)) return;
                m.usdtBalance = (m.usdtBalance||0) - commAmount;
                totalCollected += commAmount;
                allData[m.id].adminCommission = (allData[m.id].adminCommission||0) + commAmount;
                addLog(m.id,'DAILY_COMMISSION',commAmount,'USDT','عمولة يومية ('+commPercent+'%): '+fmtNum(commAmount)+' USDT من حجم '+fmtNum(todayVolume)+' USDT');
                addNotif(m.id,'خصم عمولة يومية','تم خصم '+fmtNum(commAmount)+' USDT ('+commPercent+'% من '+fmtNum(todayVolume)+' USDT) كعمولة يومية للإدارة','WARNING');
            });
            if(totalCollected > 0) {
                DB.set('users', users);
                DB.set('merchantPaymentData', allData);
            }
        }
