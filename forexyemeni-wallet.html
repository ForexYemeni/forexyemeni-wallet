        function parseFirebaseConfigSnippet(raw) {
            raw = raw.trim();
            // Try direct JSON parse first
            try { return JSON.parse(raw); } catch(e) {}
            // Try extracting from JavaScript snippet: const firebaseConfig = { ... }; or var firebaseConfig = { ... };
            var patterns = [
                /(?:const|var|let)\s+\w+\s*=\s*(\{[\s\S]*?\})\s*;/,
                /(\{[\s\S]*?"apiKey"[\s\S]*?\})/,
                /(\{[\s\S]*?"projectId"[\s\S]*?\})/
            ];
            for (var i = 0; i < patterns.length; i++) {
                var match = raw.match(patterns[i]);
                if (match) {
                    var jsonStr = match[1].trim();
                    // Replace unquoted keys with quoted keys for JSON.parse
                    jsonStr = jsonStr.replace(/(\w+)\s*:/g, '"$1":');
                    // Fix double-quoted keys that were already quoted
                    jsonStr = jsonStr.replace(/""/g, '"');
                    try { var parsed = JSON.parse(jsonStr); return parsed; } catch(e2) {
                        // Try eval as last resort for JS object syntax
                        try {
                            var obj = (new Function('return ' + match[1].trim()))();
                            if (obj && typeof obj === 'object') return obj;
                        } catch(e3) {}
                    }
                }
            }
            return null;
        }

        function exportAuditCSV() {
            var logs = DB.get('auditLog') || [];
            if (logs.length === 0) { toast('لا توجد بيانات للتصدير','warning'); return; }
            var csv = '\uFEFF' + 'العملية,التفاصيل,المستخدم,التاريخ والوقت\n';
            for (var i = 0; i < logs.length; i++) {
                var log = logs[i];
                csv += (log.action || '') + ',' + '"' + (log.details || '').replace(/"/g, '""') + '",' + (log.userId || '') + ',"' + (log.timestamp || '') + '"\n';
            }
            var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url; a.download = 'audit-log-' + new Date().toISOString().slice(0,10) + '.csv';
            a.click(); URL.revokeObjectURL(url);
            toast('تم تصدير السجل','success');
            Security.addAuditLog(null, 'EXPORT', 'تصدير سجل العمليات CSV');
        }

        function applyDbConfigSnippet() {
            var snippet = document.getElementById('db-config-snippet');
            if (!snippet || !snippet.value.trim()) { toast('الصق كود Firebase Config أولاً','error'); return; }
            var parsed = parseFirebaseConfigSnippet(snippet.value);
            if (!parsed) { toast('فشل تحليل الكود. تأكد من صحة التنسيق.','error'); return; }
            // Fill the individual fields
            var fields = ['apiKey','authDomain','projectId','storageBucket','messagingSenderId','appId'];
            fields.forEach(function(f) {
                var el = document.getElementById('dbcfg-' + f);
                if (el && parsed[f]) el.value = parsed[f];
            });
            state.dbConfigEditMode = true;
            window._dbTestSuccess = false;
            toast('تم استخراج الإعدادات بنجاح','success',false);
            render();
        }

        function pasteFromClipboard() {
            if(navigator.clipboard && navigator.clipboard.readText) {
                navigator.clipboard.readText().then(function(text) {
                    if(text) {
                        var snippetEl = document.getElementById('db-config-snippet');
                        if(snippetEl) { snippetEl.value = text.trim(); window._dbTestSuccess = false; toast('تم اللصق','success',false); }
                    }
                }).catch(function() { toast('لا يمكن الوصول للحافظة','warning',false); });
            } else { toast('المتصفح لا يدعم لصق الحافظة','warning',false); }
        }

        function getDbConfigFromFields() {
            var fields = ['apiKey','authDomain','projectId','storageBucket','messagingSenderId','appId'];
            var cfg = {};
            fields.forEach(function(f) {
                var el = document.getElementById('dbcfg-' + f);
                if (el) cfg[f] = el.value.trim();
            });
            return cfg;
        }

        function testDbConnection() {
            // First check if there's a snippet to parse
            var snippetEl = document.getElementById('db-config-snippet');
            var newConfig = null;
            if (snippetEl && snippetEl.value.trim()) {
                newConfig = parseFirebaseConfigSnippet(snippetEl.value);
            }
            // Otherwise read from individual fields
            if (!newConfig) {
                newConfig = getDbConfigFromFields();
            }
            var resultEl = document.getElementById('db-config-result');
            if(!resultEl) return;
            if(!newConfig || !newConfig.apiKey || !newConfig.projectId) { resultEl.innerHTML = '<div class="p-3 rounded-lg bg-danger/20 border border-danger/30 text-danger text-sm">❌ أدخل إعدادات Firebase صحيحة (يجب وجود apiKey و projectId)</div>'; return; }
            resultEl.innerHTML = '<div class="p-3 rounded-lg bg-warning/20 border border-warning/30 text-warning text-sm">⏳ جاري اختبار الاتصال بقاعدة البيانات...</div>';
            window._dbTestSuccess = false;
            try {
                var testAppName = 'test-' + Date.now();
                var testApp = firebase.initializeApp(newConfig, testAppName);
                var testDb = firebase.firestore(testApp);
                var startTime = Date.now();
                testDb.collection('appData').doc('settings').get().then(function(doc) {
                    var elapsed = Date.now() - startTime;
                    var dbSize = doc.exists ? 'تحتوي بيانات' : 'فارغة (جديدة)';
                    resultEl.innerHTML = '<div class="p-3 rounded-lg bg-success/20 border border-success/30 text-success text-sm">'+
                        '<p class="font-bold mb-1">✅ الاتصال ناجح!</p>'+
                        '<p class="text-xs">📡 Project: '+escHtml(newConfig.projectId)+'</p>'+
                        '<p class="text-xs">⏱️ زمن الاستجابة: '+elapsed+'ms</p>'+
                        '<p class="text-xs">📊 حالة: '+dbSize+'</p></div>';
                    window._dbTestSuccess = true;
                    window._pendingConfig = newConfig;
                    testApp.delete().catch(function(){});
                    render();
                }).catch(function(err) {
                    var errStr = err.message || '';
                    var isPermission = errStr.indexOf('permission')>=0 || errStr.indexOf('PERMISSION')>=0;
                    resultEl.innerHTML = '<div class="p-3 rounded-lg bg-danger/20 border border-danger/30 text-danger text-sm">'+
                        '<p class="font-bold mb-1">❌ فشل الاتصال</p>'+
                        '<p class="text-xs">'+escHtml(errStr)+'</p>'+
                        (isPermission?'<p class="text-xs mt-1">💡 تلميح: تأكد من تفعيل Cloud Firestore في Firebase Console وتفعيل صلاحيات القراءة</p>':'')+'</div>';
                    window._dbTestSuccess = false;
                    try { testApp.delete().catch(function(){}); } catch(e) {}
                });
            } catch(e) {
                var errMsg = e.message || '';
                var hint = '';
                if(errMsg.indexOf('Unexpected token')>=0 || errMsg.indexOf('JSON')>=0) hint = '<p class="text-xs mt-1">💡 تأكد من أن النص المُدخل هو كود JSON صالح أو كود JavaScript صالح.</p>';
                resultEl.innerHTML = '<div class="p-3 rounded-lg bg-danger/20 border border-danger/30 text-danger text-sm">'+
                    '<p class="font-bold mb-1">❌ خطأ في تحليل الإعدادات</p>'+
                    '<p class="text-xs">'+escHtml(errMsg)+'</p>'+hint+'</div>';
                window._dbTestSuccess = false;
            }
        }

        // ==================== INIT ====================
        var _initDone = false;

        function finishInit() {
            if(_initDone) return;
            _initDone = true;
            migrateData();
            // Auto-run daily commissions on load
            var lastCommDate = localStorage.getItem('fy_last_comm_date');
            var today = new Date().toISOString().split('T')[0];
            if(lastCommDate !== today) {
                setTimeout(function(){
                    if(typeof executeDailyAdminCommissions === 'function') executeDailyAdminCommissions();
                    localStorage.setItem('fy_last_comm_date', today);
                }, 5000);
            }
            var savedAuth = null;
            try { savedAuth = JSON.parse(localStorage.getItem('fy_auth_user')); } catch(e) {}
            if(savedAuth && savedAuth.id) {
                var users = DB.get('users');
                var user = users.find(function(u){return u.id===savedAuth.id;});
                if(user) {
                    if(user.isBlocked) { state.user = null; localStorage.removeItem('fy_auth_user'); setView('login'); toast('هذا الحساب محظور','error'); return; }
                    // === ALWAYS check admin password ===
                    if(user.role === 'ADMIN') {
                        // Check if password is still default admin123
                        var storedPass = user.password || '';
                        var isAdminDefault = (storedPass === 'admin123' || Security.hashPassword('admin123') === storedPass);
                        if(isAdminDefault) {
                            user.passwordMustChange = true;
                            DB.set('users', users);
                            state.user = {id: user.id};
                            localStorage.setItem('fy_auth_user', JSON.stringify({id: user.id}));
                            setView('change-password-required');
                            return;
                        }
                        // Password was changed but passwordMustChange flag stuck - clear it
                        if(user.passwordMustChange === true) {
                            user.passwordMustChange = false;
                            DB.set('users', users);
                        }
                    }
                    DB.ensureUserFields(user);
                    state.user = {id: user.id};
                    // Notify Service Worker about restored session
                    try {
                        var idbReq2 = indexedDB.open('fy-wallet-db', 1);
                        idbReq2.onupgradeneeded = function(e) {
                            var idb = e.target.result;
                            if (!idb.objectStoreNames.contains('session')) idb.createObjectStore('session');
                        };
                        idbReq2.onsuccess = function(e) {
                            try {
                                var idb = e.target.result;
                                if (idb.objectStoreNames.contains('session')) {
                                    var tx = idb.transaction('session', 'readwrite');

                        navigator.serviceWorker.ready.then(function(reg) {

                        });
                    } catch(e) {}

        function initData() {
            var keys = Object.keys(window.appData);
            var pending = keys.length;

            if(pending === 0) { finishInit(); return; }

            // Safety: show login after 8 seconds no matter what
            setTimeout(function() { finishInit(); }, 8000);

            keys.forEach(function(key) {
                db.collection('appData').doc(key).get().then(function(doc) {
                        if(doc.exists && doc.data() && doc.data().data) {
                            window.appData[key] = doc.data().data;
                        } else {
                            window.appData[key] = getDefaultData(key);
                            db.collection('appData').doc(key).set({ data: window.appData[key] }).catch(function(){});
                        }
                        pending--;
                        if(pending <= 0) finishInit();
                    }).catch(function(err) {
                        console.error('Load ' + key + ' error:', err);
                        window.appData[key] = getDefaultData(key);
                        pending--;
                        if(pending <= 0) finishInit();
                    });
            });

            db.collection('appData').onSnapshot(function(snapshot) {
                snapshot.docChanges().forEach(function(change) {
                    if(change.type === 'modified' && change.doc.data()) {
                        var k = change.doc.id;
                        var oldData = window.appData[k];
                        var newData = change.doc.data().data;
                        if(window.appData.hasOwnProperty(k)) {
                            window.appData[k] = newData;
                        }
                        // Re-render when user data changes (e.g. KYC approval) so checks update live
                        if(k === 'users' && state.user && state.user.id) {
                            var updatedUser = newData.find(function(u){return u.id === state.user.id;});
                            if(updatedUser && updatedUser.kycStatus !== (window.appData._lastKycStatus)) {
                                window.appData._lastKycStatus = updatedUser.kycStatus;
                                // Only re-render if not on login/register pages to avoid interference
                                var v = state.view;
                                if(v !== 'login' && v !== 'register' && v !== 'loading' && v !== 'change-password-required') {
                                    setTimeout(function(){ render(); }, 300);
                                }
                            }
                        }
                        // Check for new messages → play sound for recipient
                        if(k === 'messages' && oldData && newData) {
                            var currentUser = state.user;
                            if (currentUser && currentUser.id) {
                                var notifSettings = getUserNotifSettings(currentUser.id);
                                var oldLen = Array.isArray(oldData) ? oldData.length : 0;
                                var newLen = Array.isArray(newData) ? newData.length : 0;
                                if (newLen > oldLen) {
                                    // New message(s) added
                                    for (var mi = oldLen; mi < newLen; mi++) {
                                        var msg = newData[mi];
                                        if (msg && msg.toId === currentUser.id && !msg.isRead) {
                                            // Message is for current user
                                            var senderName = 'مستخدم';
                                            var users = window.appData.users;
                                            if (users) {
                                                var sender = users.find(function(u){return u.id === msg.fromId;});
                                                if (sender) senderName = sender.name;
                                            }
                                            toast('💬 رسالة جديدة من ' + senderName, 'info', true);
                                            if (notifSettings.sound) playNotifSound();
                                            if (notifSettings.vibrate) { try { if (navigator.vibrate) navigator.vibrate([200, 100, 200]); } catch(e) {} }
                                        }
                                    }
                                }
                            }
                        }
                        // Check for new notifications → play sound
                        if(k === 'notifications' && oldData && newData) {
                            var currentUser = state.user;
                            if (currentUser && currentUser.id) {
                                var notifSettings = getUserNotifSettings(currentUser.id);
                                var oldLenN = Array.isArray(oldData) ? oldData.length : 0;
                                var newLenN = Array.isArray(newData) ? newData.length : 0;
                                if (newLenN > oldLenN) {
                                    for (var ni = oldLenN; ni < newLenN; ni++) {
                                        var notif = newData[ni];
                                        if (notif && notif.userId === currentUser.id && !notif.isRead) {
                                            if (notifSettings.sound) playNotifSound();
                                            if (notifSettings.vibrate) { try { if (navigator.vibrate) navigator.vibrate([200, 100, 200]); } catch(e) {} }
                                        }
                                    }
                                }
                            }
                        }
                        if(_initDone) render();
                    }
                });
            });
        }

        function _hashPin(pin) {
            var hash = 0;
            var salt = 'fy_pin_salt_' + pin;
            for (var i = 0; i < salt.length; i++) {
                var char = salt.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return 'pin_' + Math.abs(hash).toString(36);
        }

        // ==================== PASSWORD STRENGTH INDICATOR ====================
        function getPasswordStrength(pass) {
            if (!pass) return {score:0, label:'', color:'', percent:0};
            var score = 0;
            if (pass.length >= 6) score++;
            if (pass.length >= 8) score++;
            if (pass.length >= 12) score++;
            if (/[a-z]/.test(pass) && /[A-Z]/.test(pass)) score++;
            if (/[0-9]/.test(pass)) score++;
            if (/[^a-zA-Z0-9]/.test(pass)) score++;
            if (score <= 2) return {score:score, label:'ضعيفة', color:'#F6465D', percent:Math.min(score/6*100,25)};
            if (score <= 4) return {score:score, label:'متوسطة', color:'#FCD535', percent:Math.min(score/6*100,60)};
            return {score:score, label:'قوية', color:'#0ECB81', percent:Math.min(score/6*100,100)};
        }

            return '<div id="pass-strength-box" class="hidden mt-2">' +
                '<div class="flex justify-between items-center mb-1"><span class="text-xs ' + C.muted + '">قوة كلمة المرور</span>' +
                '<span id="pass-strength-label" class="text-xs font-bold">—</span></div>' +
                '<div class="w-full h-2 rounded-full bg-gray-700 overflow-hidden">' +
                '<div id="pass-strength-bar" class="h-full rounded-full transition-all duration-300" style="width:0%"></div></div>' +
                '<div class="flex justify-between mt-1">' +
                '<span id="pass-strength-tips" class="text-xs text-gray-500"></span></div></div>';
        }

        function updatePasswordStrength() {
            var passInput = document.getElementById('reg-pass');
            var box = document.getElementById('pass-strength-box');
            if (!passInput || !box) return;
            var pass = passInput.value;
            if (!pass) { box.classList.add('hidden'); return; }
            box.classList.remove('hidden');
            var s = getPasswordStrength(pass);
            var bar = document.getElementById('pass-strength-bar');
            var label = document.getElementById('pass-strength-label');
            var tips = document.getElementById('pass-strength-tips');
            if (bar) { bar.style.width = s.percent + '%'; bar.style.background = s.color; }
            if (label) { label.textContent = s.label; label.style.color = s.color; }
            var tipsArr = [];
            if (pass.length < 8) tipsArr.push('8 أحرف على الأقل');
            if (!/[A-Z]/.test(pass)) tipsArr.push('حرف كبير');
            if (!/[0-9]/.test(pass)) tipsArr.push('رقم');
            if (!/[^a-zA-Z0-9]/.test(pass)) tipsArr.push('رمز خاص');
            if (tips) tips.textContent = tipsArr.length > 0 ? '💡 ' + tipsArr.join(' · ') : '✅ ممتازة';
        }

                return co ? co.flag : '';
            }).join('') : ' 🌍';
            return '<div class="p-3 rounded-lg border '+c.border+' '+c.bg+' flex items-center gap-3">'+
                '<span class="text-xl shrink-0">'+c.icon+'</span>'+
                '<p class="text-sm '+c.text+' flex-1">'+escHtml(banner)+'</p>'+
                '<span class="text-sm shrink-0">'+countryFlags+'</span></div>';
        }

        function renderAdminBannerSettings(C) {
            var banner = DB.getSetting('admin_banner') || '';
            var bannerType = DB.getSetting('admin_banner_type') || 'INFO';
            var bannerActive = DB.getSetting('admin_banner_active') === 'true';
            var bannerCountries = DB.getSetting('admin_banner_countries') || '';
            var selectedCountries = bannerCountries ? bannerCountries.split(',').map(function(c){return c.trim();}) : [];
            // Build country flags HTML
            var flagsHtml = '<div class="flex flex-wrap gap-2 mb-3" id="banner-country-flags">';
            // "All" button
            flagsHtml += '<button onclick="setBannerCountry(\'ALL\')" class="w-10 h-10 rounded-lg flex items-center justify-center text-lg btn border-2 '+(selectedCountries.indexOf('ALL')>=0 ? 'border-primary bg-primary/20' : C.border+' '+C.card)+'" title="جميع الدول">🌍</button>';
            countries.forEach(function(co) {
                var isSelected = selectedCountries.indexOf(co.code) >= 0;
                flagsHtml += '<button onclick="setBannerCountry(\''+co.code+'\')" class="w-10 h-10 rounded-lg flex items-center justify-center text-lg btn border-2 '+(isSelected ? 'border-primary bg-primary/20' : C.border+' '+C.card)+'" title="'+escHtml(co.name)+'">'+co.flag+'</button>';
            });
            flagsHtml += '</div>';
            // Show selected countries
            var selectedLabel = '🌍 الجميع';
            if (selectedCountries.length > 0 && selectedCountries[0] !== 'ALL') {
                selectedLabel = selectedCountries.map(function(cc){
                    var co = countries.find(function(x){return x.code===cc;});
                    return co ? co.flag+' '+co.name : cc;
                }).join(' • ');
            }
            return '<div class="'+C.card+' rounded-xl p-4 border '+C.border+'"><h3 class="font-bold '+C.text+' mb-3">📢 شعار تنبيه للمستخدمين</h3>'+
                '<p class="text-xs '+C.muted+' mb-3">يظهر هذا التنبيه للمستخدمين في أعلى الصفحة الرئيسية</p>'+
                '<div class="'+C.card+' rounded-xl p-3 border '+C.border+' mb-3"><p class="text-xs '+C.muted+' mb-2">🎯 استهداف الدول (اختر أعلام الدول):</p>'+
                '<p class="text-xs font-medium '+C.text+' mb-2">'+selectedLabel+'</p>'+flagsHtml+'</div>'+
                '<div class="flex gap-2 mb-3">'+
                '<button onclick="DB.setSetting(\'admin_banner_type\',\'INFO\');render()" class="flex-1 py-2 rounded-lg text-xs font-bold btn '+(bannerType==='INFO'?'bg-info text-white':'border border-info/30 '+C.text)+'">ℹ️ معلومة</button>'+
                '<button onclick="DB.setSetting(\'admin_banner_type\',\'WARNING\');render()" class="flex-1 py-2 rounded-lg text-xs font-bold btn '+(bannerType==='WARNING'?'bg-warning text-dark-bg':'border border-warning/30 '+C.text)+'">⚠️ تحذير</button>'+
                '<button onclick="DB.setSetting(\'admin_banner_type\',\'DANGER\');render()" class="flex-1 py-2 rounded-lg text-xs font-bold btn '+(bannerType==='DANGER'?'bg-danger text-white':'border border-danger/30 '+C.text)+'">🚨 خطر</button>'+
                '<button onclick="DB.setSetting(\'admin_banner_type\',\'SUCCESS\');render()" class="flex-1 py-2 rounded-lg text-xs font-bold btn '+(bannerType==='SUCCESS'?'bg-success text-dark-bg':'border border-success/30 '+C.text)+'">✅ نجاح</button></div>'+
                '<textarea id="set-banner-text" class="w-full px-3 py-2.5 rounded-xl border '+C.input+' outline-none text-sm mb-3" rows="2" placeholder="اكتب نص التنبيه هنا...">'+escHtml(banner)+'</textarea>'+
                '<button onclick="saveBanner()" class="w-full py-2.5 rounded-lg font-bold btn '+(bannerActive?'bg-danger text-white':'bg-success text-dark-bg')+' text-sm">'+(bannerActive?'🔒 إخفاء التنبيه':'📢 تفعيل وحفظ التنبيه')+'</button></div>';
        }

        function setBannerCountry(code) {
            var current = DB.getSetting('admin_banner_countries') || '';
            var selected = current ? current.split(',').map(function(c){return c.trim();}) : [];
            var idx = selected.indexOf(code);
            if (code === 'ALL') {
                selected = ['ALL']; // "All" clears everything else
            } else {
                // Remove 'ALL' if selecting specific country
                selected = selected.filter(function(c){return c !== 'ALL';});
                if (idx >= 0) {
                    selected.splice(idx, 1);
                } else {
                    selected.push(code);
                }
            }
            if (selected.length === 0) selected = ['ALL'];
            DB.setSetting('admin_banner_countries', selected.join(','));
            render();
        }

        function saveBanner() {
            var text = document.getElementById('set-banner-text');
            if (!text) return;
            var banner = text.value.trim();
            if (!banner) { toast('اكتب نص التنبيه أولاً', 'error'); return; }
            var isActive = DB.getSetting('admin_banner_active') === 'true';
            if (isActive) {
                // Toggle off
                DB.setSetting('admin_banner_active', 'false');
                DB.setSetting('admin_banner', '');
                toast('تم إخفاء التنبيه', 'success');
            } else {
                DB.setSetting('admin_banner', banner);
                DB.setSetting('admin_banner_active', 'true');
                toast('تم تفعيل التنبيه ✓', 'success');
            }
            render();
        }

        // ==================== LIVE EXCHANGE RATES ====================
        var _liveRates = null;
        var _liveRatesTimer = null;
        var _liveRatesLastFetch = 0;

        function _fetchLiveRates() {
            if (Date.now() - _liveRatesLastFetch < 300000) return; // Cache 5 min
            _liveRatesLastFetch = Date.now();
            // Admin rate is the PRIMARY source (accurate for Yemen)
            var adminRateYER = parseFloat(DB.getSetting('exchange_rate')) || 0;
            var adminRateSAR = parseFloat(DB.getSetting('exchange_rate_sar')) || 0;
            // If admin has set rates, use them immediately (no API needed)
            if (adminRateYER > 0) {
                _liveRates = {
                    USD_YER: adminRateYER,
                    USD_SAR: 3.75,
                    YER_SAR: adminRateSAR > 0 ? adminRateSAR : adminRateYER / 3.75,
                    YER_USD: 1 / adminRateYER,
                    SAR_YER: adminRateSAR > 0 ? adminRateSAR : adminRateYER / 3.75,
                    timestamp: new Date().toISOString(),
                    source: 'admin'
                };
                return;
            }
            // Fallback: try API only if admin hasn't set rates
            var controller = new AbortController();
            var timeout = setTimeout(function(){ controller.abort(); }, 10000);
            fetch('https://api.exchangerate-api.com/v4/latest/USD', {signal: controller.signal})
            .then(function(r){ clearTimeout(timeout); return r.json(); })
            .then(function(data) {
                if (data && data.rates) {
                    var apiYER = data.rates.YER || 0;
                    var finalYER = apiYER > 100 ? apiYER : 533; // Sanity check
                    var finalSAR = data.rates.SAR || 3.75;
                    _liveRates = {
                        USD_YER: finalYER,
                        USD_SAR: finalSAR,
                        YER_SAR: finalYER / finalSAR,
                        YER_USD: 1 / finalYER,
                        SAR_YER: finalYER / finalSAR,
                        timestamp: new Date().toISOString(),
                        source: 'api'
                    };
                }
            }).catch(function(err) {
                clearTimeout(timeout);
                if (!_liveRates) {
                    _liveRates = {
                        USD_YER: 533, USD_SAR: 3.75, YER_SAR: 142.13,
                        YER_USD: 1/533, SAR_YER: 142.13,
                        timestamp: new Date().toISOString(), source: 'fallback'
                    };
                }
            });
        }

        function _startLiveRates() {
            _fetchLiveRates();
            if (_liveRatesTimer) clearInterval(_liveRatesTimer);
            _liveRatesTimer = setInterval(_fetchLiveRates, 300000); // Every 5 min
        }

        function renderLiveRateBadge(C) {
            if (!_liveRates || !_liveRates.USD_YER) return '';
            var sarToYER = _liveRates.SAR_YER ? _liveRates.SAR_YER.toFixed(2) : (_liveRates.USD_YER / 3.75).toFixed(2);
            var sourceLabel = _liveRates.source === 'admin' ? '⚙️ إدارة' : '📡 API';
            return '<div class="flex flex-col gap-1 p-3 rounded-lg bg-success/10 border border-success/30">' +
                '<div class="flex items-center justify-between"><span class="text-xs text-success font-bold">📈 أسعار الصرف</span>' +
                '<span class="text-xs ' + C.muted + '">' + sourceLabel + ' • ' + getTimeAgo(_liveRates.timestamp) + '</span></div>' +
                '<div class="flex gap-3">' +
                '<span class="text-xs ' + C.text + '">🇺🇸 1 USD = <b>' + Math.round(_liveRates.USD_YER) + '</b> YER</span>' +
                '<span class="text-xs ' + C.text + '">🇸🇦 1 SAR = <b>' + sarToYER + '</b> YER</span></div></div>';
        }

        console.log('%c ForexYemeni Wallet v5.1 (Stable - All bug fixes applied) ', 'background: #F0B90B; color: #0B0E11; font-size: 16px; font-weight: bold; padding: 8px 16px; border-radius: 4px;');
    </script>
</body>
</html>
