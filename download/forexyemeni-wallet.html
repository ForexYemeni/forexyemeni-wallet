    <script>
        // ==================== FIREBASE SETUP ====================
        var defaultFirebaseConfig = {
            apiKey: "AIzaSyD-WgZiMm2tCcLSy6e265F_u4yahaWlCd0",
            authDomain: "forexyemeni-wallet.firebaseapp.com",
            projectId: "forexyemeni-wallet",
            storageBucket: "forexyemeni-wallet.firebasestorage.app",
            messagingSenderId: "52486252073",
            appId: "1:52486252073:web:0e8e590a77ba0b82399e38"
        };
        var firebaseConfig = defaultFirebaseConfig;
        // Firebase config is hardcoded only - no localStorage override for security
        // try { var savedConfig = localStorage.getItem('fy_firebase_config'); if (savedConfig) firebaseConfig = JSON.parse(savedConfig); } catch (e) { console.error('Error loading firebase config', e); }
        firebase.initializeApp(firebaseConfig);
        var db = firebase.firestore();

        // ==================== FCM PUSH NOTIFICATIONS ====================
        var messaging = null;
        var _fcmToken = null;
        var _fcmInitialized = false;
        try {
            messaging = firebase.messaging();
        } catch(fcmErr) {
            console.warn('[FCM] Messaging init failed:', fcmErr);
        }

        // Register service worker for FCM
        if ('serviceWorker' in navigator && messaging) {
            navigator.serviceWorker.register('firebase-messaging-sw.js').then(function(reg) {
                console.log('[FCM] Service Worker registered:', reg.scope);
                try { messaging.useServiceWorker(reg); } catch(e) { console.warn('[FCM] useServiceWorker error:', e); }
            }).catch(function(err) {
                console.warn('[FCM] SW registration failed:', err);
            });
        }

        // Request notification permission and get FCM token
        function requestNotifPermission() {
            if (!('Notification' in window)) {
                toast('المتصفح لا يدعم الإشعارات','error',false);
                return Promise.resolve(false);
            }
            if (Notification.permission === 'granted') {
                getFCMToken().catch(function(){});
                initWebPush();
                return Promise.resolve(true);
            }
            if (Notification.permission === 'denied') {
                toast('الإشعارات محظورة - افتح إعدادات الموقع في المتصفح وفعّل الإشعارات ثم أعد المحاولة','error',false);
                return Promise.resolve(false);
            }
            return Notification.requestPermission().then(function(permission) {
                if (permission === 'granted') {
                    toast('تم تفعيل الإشعارات بنجاح ✓','success',false);
                    getFCMToken().catch(function(){});
                    initWebPush();
                    return true;
                } else {
                    toast('لم يتم تفعيل الإشعارات','error',false);
                    return false;
                }
            });
        }

        // Get FCM token and save to Firestore
        function getFCMToken() {
            if (!messaging) return Promise.resolve(null);
            return messaging.getToken({ vapidKey: 'BKP7s2QeKt24i9jX5mBFlywmv5NPEeKDTxDS9ERyPIFQmx0XwiDutZ6187j3CmuRcfPY5zSDAz2xXkZ-_9OeWlg' }).then(function(token) {
                if (token && token !== _fcmToken) {
                    _fcmToken = token;
                    console.log('[FCM] Token received:', token.substring(0, 20) + '...');
                    saveFCMToken(token);
                    _fcmInitialized = true;
                }
                return token;
            }).catch(function(err) {
                console.warn('[FCM] Token error:', err);
                return null;
            });
        }

        // Save FCM token to Firestore (under fcmTokens collection)
        function saveFCMToken(token) {
            var currentUser = state.user;
            if (!currentUser || !currentUser.id) return;
            
            db.collection('fcmTokens').doc(currentUser.id).get().then(function(doc) {
                var existingTokens = [];
                if (doc.exists && doc.data() && doc.data().tokens) {
                    existingTokens = doc.data().tokens;
                }
                // Add token if not already exists
                if (existingTokens.indexOf(token) === -1) {
                    existingTokens.push(token);
                    // Keep max 5 tokens per user (different devices)
                    if (existingTokens.length > 5) {
                        existingTokens = existingTokens.slice(-5);
                    }
                    db.collection('fcmTokens').doc(currentUser.id).set({
                        tokens: existingTokens,
                        userId: currentUser.id,
                        updatedAt: new Date().toISOString()
                    });
                    console.log('[FCM] Token saved for user:', currentUser.id);
                }
            }).catch(function(err) {
                console.warn('[FCM] Save token error:', err);
            });
        }

        // Remove FCM token on logout
        function removeFCMToken() {
            var currentUser = state.user;
            if (!currentUser || !_fcmToken) return;
            
            db.collection('fcmTokens').doc(currentUser.id).get().then(function(doc) {
                if (doc.exists && doc.data() && doc.data().tokens) {
                    var tokens = doc.data().tokens;
                    var idx = tokens.indexOf(_fcmToken);
                    if (idx !== -1) {
                        tokens.splice(idx, 1);
                        db.collection('fcmTokens').doc(currentUser.id).set({
                            tokens: tokens,
                            userId: currentUser.id,
                            updatedAt: new Date().toISOString()
                        });
                    }
                }
            }).catch(function(){});
            _fcmToken = null;
            _fcmInitialized = false;
        }

        // Handle foreground messages (app is open)
        if (messaging) {
            try {
                messaging.onMessage(function(payload) {
                    console.log('[FCM] Foreground message:', payload);
                    var title = payload.data && payload.data.title ? payload.data.title : 'ForexYemeni';
                    var body = payload.data && payload.data.body ? payload.data.body : 'لديك إشعار جديد';
                    if ('Notification' in window && Notification.permission === 'granted') {
                        new Notification(title, {
                            body: body,
                            icon: 'icon.png',
                            badge: 'icon.png',
                            dir: 'rtl',
                            lang: 'ar',
                            tag: payload.data && payload.data.tag ? payload.data.tag : 'fy-fg-' + Date.now()
                        });
                    }
                    playNotifSound();
                    toast(title, 'info', true);
                    render();
                });

                messaging.onTokenRefresh(function() {
                    messaging.getToken().then(function(token) {
                        if (token) {
                            _fcmToken = token;
                            saveFCMToken(token);
                        }
                    }).catch(function(){});
                });
            } catch(e) {
                console.warn('[FCM] onMessage/onTokenRefresh error:', e);
            }
        }

        // ==================== WEB PUSH CRYPTO ====================
        var WebPush = {
            b64url: function(data) {
                var bytes = (data instanceof ArrayBuffer) ? new Uint8Array(data) : data;
                var binary = '';
                for (var i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
                return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
            },
            b64urlDecode: function(str) {
                str = str.replace(/-/g, '+').replace(/_/g, '/');
                while (str.length % 4) str += '=';
                return Uint8Array.from(atob(str), function(c) { return c.charCodeAt(0); });
            },
            concat: function() {
                var arrays = []; for (var a = 0; a < arguments.length; a++) arrays.push(arguments[a]);
                var totalLen = arrays.reduce(function(s, a) { return s + a.length; }, 0);
                var result = new Uint8Array(totalLen), offset = 0;
                arrays.forEach(function(arr) { result.set(arr, offset); offset += arr.length; });
                return result;
            },
            hkdf: async function(salt, ikm, info, length) {
                var extractKey = await crypto.subtle.importKey('raw', salt, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
                var prk = new Uint8Array(await crypto.subtle.sign('HMAC', extractKey, ikm));
                var expandKey = await crypto.subtle.importKey('raw', prk, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
                var n = Math.ceil(length / 32), okm = new Uint8Array(0), t = new Uint8Array(0);
                for (var i = 1; i <= n; i++) {
                    var input = WebPush.concat(t, info, new Uint8Array([i]));
                    t = new Uint8Array(await crypto.subtle.sign('HMAC', expandKey, input));
                    okm = WebPush.concat(okm, t);
                }
                return okm.slice(0, length);
            },
            generateVapidKeys: async function() {
                var kp = await crypto.subtle.generateKey({ name: 'ECDSA', namedCurve: 'P-256' }, true, ['sign', 'verify']);
                return {
                    publicKey: WebPush.b64url(await crypto.subtle.exportKey('raw', kp.publicKey)),
                    privateKeyJwk: await crypto.subtle.exportKey('jwk', kp.privateKey)
                };
            },
            createVapidJwt: async function(origin, privJwk) {
                var header = { typ: 'JWT', alg: 'ES256' };
                var body = { aud: new URL(origin).origin, exp: Math.floor(Date.now() / 1000) + 43200, sub: 'mailto:admin@forexyemeni.com' };
                var enc = new TextEncoder();
                var h = WebPush.b64url(enc.encode(JSON.stringify(header)));
                var b = WebPush.b64url(enc.encode(JSON.stringify(body)));
                var input = h + '.' + b;
                var privKey = await crypto.subtle.importKey('jwk', privJwk, { name: 'ECDSA', namedCurve: 'P-256' }, false, ['sign']);
                var sig = await crypto.subtle.sign({ name: 'ECDSA', hash: 'SHA-256' }, privKey, enc.encode(input));
                return input + '.' + WebPush.b64url(sig);
            },
            encrypt: async function(payload, subscription) {
                var data = new TextEncoder().encode(payload);
                var p256dh = WebPush.b64urlDecode(subscription.keys.p256dh);
                var auth = WebPush.b64urlDecode(subscription.keys.auth);
                var clientPub = await crypto.subtle.importKey('raw', p256dh, { name: 'ECDH', namedCurve: 'P-256' }, false, []);
                var ephKp = await crypto.subtle.generateKey({ name: 'ECDH', namedCurve: 'P-256' }, true, []);
                var ephPub = new Uint8Array(await crypto.subtle.exportKey('raw', ephKp.publicKey));
                var shared = new Uint8Array(await crypto.subtle.deriveBits({ name: 'ECDH', public: clientPub }, ephKp.privateKey, 256));
                var salt = crypto.getRandomValues(new Uint8Array(16));
                var infoBase = new TextEncoder().encode('Content-Encoding: aes128gcm');
                var cekInfo = WebPush.concat(infoBase, new Uint8Array([0x00, 0x00, 0x01]));
                var nonceInfo = WebPush.concat(infoBase, new Uint8Array([0x00, 0x00, 0x00]));
                var cek = await WebPush.hkdf(auth, shared, cekInfo, 16);
                var nonce = await WebPush.hkdf(auth, shared, nonceInfo, 12);
                var aesKey = await crypto.subtle.importKey('raw', cek, { name: 'AES-GCM' }, false, ['encrypt']);
                var ct = new Uint8Array(await crypto.subtle.encrypt({ name: 'AES-GCM', iv: nonce }, aesKey, data));
                var rs = new Uint8Array(2); new DataView(rs.buffer).setUint16(0, 4096, false);
                return WebPush.concat(salt, rs, new Uint8Array([65]), ephPub, ct);
            },
            send: async function(sub, payload, privJwk, pubKey) {
                var enc = await WebPush.encrypt(payload, sub);
                var jwt = await WebPush.createVapidJwt(sub.endpoint, privJwk);
                var resp = await fetch(sub.endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/octet-stream', 'Content-Encoding': 'aes128gcm', 'TTL': '2419200', 'Authorization': 'vapid t=' + jwt + ', k=' + pubKey }
                });
                if (!resp.ok && resp.status !== 201) throw new Error('Push failed: ' + resp.status);
                return resp;
            }
        };

        // ==================== WEB PUSH INITIALIZATION ====================
        var _vapidKeys = null;
        var _pushSubscription = null;
        var _wpInit = false;

        async function initWebPush() {
            if (_wpInit) return;
            _wpInit = true;
            try {
                // Check if push is supported
                if (!('serviceWorker' in navigator) || !('PushManager' in window) || !('crypto' in window) || !crypto.subtle) {
                    console.log('[WebPush] Not supported in this browser');
                    return;
                }
                // Load or generate VAPID keys
                var vapidDoc = await db.collection('systemConfig').doc('vapidKeys').get();
                if (vapidDoc.exists && vapidDoc.data() && vapidDoc.data().publicKey && vapidDoc.data().privateKeyJwk) {
                    _vapidKeys = { publicKey: vapidDoc.data().publicKey, privateKeyJwk: vapidDoc.data().privateKeyJwk };
                    console.log('[WebPush] VAPID keys loaded');
                } else {
                    _vapidKeys = await WebPush.generateVapidKeys();
                    await db.collection('systemConfig').doc('vapidKeys').set({
                        publicKey: _vapidKeys.publicKey,
                        privateKeyJwk: _vapidKeys.privateKeyJwk,
                        createdAt: new Date().toISOString()
                    });
                    console.log('[WebPush] New VAPID keys generated and saved');
                }
                // Create push subscription
                var reg = await navigator.serviceWorker.ready;
                var existing = await reg.pushManager.getSubscription();
                if (existing) {
                    _pushSubscription = existing;
                    console.log('[WebPush] Existing subscription found');
                } else {
                    var pubKeyArray = WebPush.b64urlDecode(_vapidKeys.publicKey);
                    _pushSubscription = await reg.pushManager.subscribe({
                        userVisibleOnly: true,
                        applicationServerKey: pubKeyArray
                    });
                    console.log('[WebPush] New subscription created');
                }
                // Save subscription to Firestore
                var currentUser = state.user;
                if (currentUser && currentUser.id && _pushSubscription) {
                    var subData = _pushSubscription.toJSON();
                    await db.collection('pushSubscriptions').doc(currentUser.id).set({
                        endpoint: subData.endpoint,
                        keys: subData.keys,
                        userId: currentUser.id,
                        updatedAt: new Date().toISOString()
                    });
                    console.log('[WebPush] Subscription saved for user:', currentUser.id);
                }
            } catch (err) {
                console.warn('[WebPush] Init error:', err);
            }
        }

        // ==================== SEND PUSH NOTIFICATION ====================
        function queuePushNotification(userId, title, body, type, clickAction) {
            if (!userId || !title) return;
            // Try Web Push directly (works without Cloud Functions!)
            if (_vapidKeys) {
                db.collection('pushSubscriptions').doc(userId).get().then(function(doc) {
                    if (!doc.exists || !doc.data() || !doc.data().endpoint) return;
                    var sub = { endpoint: doc.data().endpoint, keys: doc.data().keys };
                    var payload = JSON.stringify({ title: title, body: body || '', type: type || 'INFO', clickAction: clickAction || '', tag: 'fy-' + Date.now() });
                    WebPush.send(sub, payload, _vapidKeys.privateKeyJwk, _vapidKeys.publicKey).then(function() {
                        console.log('[WebPush] Notification sent to:', userId);
                    }).catch(function(err) {
                        console.warn('[WebPush] Send error:', err);
                        // Fallback: save to pushQueue for Cloud Functions if deployed later
                        saveToPushQueue(userId, title, body, type);
                    });
                }).catch(function(err) {
                    console.warn('[WebPush] Get subscription error:', err);
                    saveToPushQueue(userId, title, body, type);
                });
            } else {
                // No VAPID keys yet - save to queue
                saveToPushQueue(userId, title, body, type);
            }
        }

        function saveToPushQueue(userId, title, body, type) {
            try {
                db.collection('pushQueue').add({
                    userId: userId, title: title, body: body || '', type: type || 'INFO',
                    processed: false, createdAt: new Date().toISOString()
                }).catch(function(){});
            } catch(e) {}
        }

        // ==================== SECURITY UTILITIES ====================

            // SHA-256 hash (returns hex string) - Pure JS implementation for ALL browsers
            sha256: function(str) {
                // Pure JS SHA-256 - works in ALL browsers synchronously
                var encoder = new TextEncoder();

                var byteStr = '';

                function rr(v,n){return(v>>>n)|(v<<(32-n));}
                function ch(x,y,z){return(x&y)^(~x&z);}
                function maj(x,y,z){return(x&y)^(x&z)^(y&z);}
                function sig0(x){return rr(x,2)^rr(x,13)^rr(x,22);}
                function sig1(x){return rr(x,6)^rr(x,11)^rr(x,25);}
                function theta0(x){return rr(x,7)^rr(x,18)^(x>>>3);}
                function theta1(x){return rr(x,17)^rr(x,19)^(x>>>10);}
                var msgLen = byteStr.length;

                var bitLen = msgLen * 8;
                for(var i=0;i<8;i++) byteStr += String.fromCharCode((bitLen>>>(i*8))&0xff);

                var h = H.slice();
                for(var i=0;i<words.length;i+=16){

                    h[4]=(h[4]+e)|0;h[5]=(h[5]+f)|0;h[6]=(h[6]+g)|0;h[7]=(h[7]+hh)|0;
                }

            checkBruteForce: function(phone) {
                // Fast local check first
                var attempts = Security.getAttempts();
                var record = attempts[phone];
                if (record) {
                    var now = Date.now();
                    if (record.lockUntil && now < record.lockUntil) {
                        var mins = Math.ceil((record.lockUntil - now) / 60000);
                        return { allowed: false, locked: true, remaining: 0, waitMinutes: mins };
                    }
                    if (record.lockUntil && now >= record.lockUntil) {
                        delete attempts[phone];
                        Security.saveAttempts(attempts);
                    }
                    if (record.count >= 5 && (!record.lockUntil || now >= record.lockUntil)) {
                        attempts[phone] = { count: record.count, lockUntil: now + 15*60*1000, lastAttempt: now };
                        Security.saveAttempts(attempts);

                        var phoneDocId = phone.replace(/[^0-9]/g, '');

                            count: record.count, lockUntil: now + 15*60*1000, lastAttempt: now
                        });

                    }
                    if (record.count >= 5) {
                        return { allowed: false, locked: true, remaining: 0, waitMinutes: 15 };
                    }
                    return { allowed: true, remaining: 5 - record.count };
                }
                // Check Firestore
                var phoneDocId = phone.replace(/[^0-9]/g, '');
                db.collection('loginAttempts').doc(phoneDocId).get().then(function(doc) {
                    if (doc.exists && doc.data()) {
                        var data = doc.data();
                        var now = Date.now();
                        if (data.lockUntil && now < data.lockUntil) {
                            // Sync to localStorage
                            attempts[phone] = data;
                            Security.saveAttempts(attempts);
                        }
                    }
                }).catch(function(){});
                return { allowed: true, remaining: 5 };

        function logout() {
            var prevUserId = state.user ? state.user.id : null;
            removeFCMToken();
            if(prevUserId) Security.invalidateSession(prevUserId);
            // Clear IndexedDB session for SW
            try {
                var idbReq = indexedDB.open('fy-wallet-db', 1);
                idbReq.onupgradeneeded = function(e) {
                    var idb = e.target.result;
                    if (!idb.objectStoreNames.contains('session')) idb.createObjectStore('session');
                };
                idbReq.onsuccess = function(e) {
                    try {
                        var idb = e.target.result;
                        if (idb.objectStoreNames.contains('session')) {
                            var tx = idb.transaction('session', 'readwrite');
                            tx.objectStore('session').delete('userId');
                        }
                    } catch(err) {}
                };
                navigator.serviceWorker.ready.then(function(reg) {
                    if (reg.active) reg.active.postMessage({ type: 'LOGOUT' });
                });
            } catch(e) {}
            state.user = null;
            localStorage.removeItem('fy_auth_user');
            setView('login');
        }

        function onDepPmChange() {
            var sel = document.getElementById('dep-pm');
            if(!sel) return;
            state.depPmId = sel.value;
            clearFieldImage('depReceipt');
            // Get current PM - could be admin or merchant method
            var pm = null;
            var merchantSelect = document.getElementById('dep-merchant');
            var merchantId = merchantSelect ? merchantSelect.value : '';
            if(merchantId) {
                // It's a merchant method
                var mMethods = getMerchantMethods(merchantId);
                pm = mMethods.find(function(p){return p.id===state.depPmId;});
            } else {
                // It's an admin method
                pm = DB.get('paymentMethods').find(function(p){return p.id===state.depPmId;});
            }
            var isCrypto = pm && pm.type === 'CRYPTO';
            var curRow = document.getElementById('dep-currency-row');
            var cryptoRow = document.getElementById('dep-amount-crypto-row');
            if(curRow) curRow.classList.toggle('hidden', !!isCrypto);
            if(cryptoRow) cryptoRow.classList.toggle('hidden', !isCrypto);
            // Auto-select currency based on payment method's currency
            if(!isCrypto && pm && pm.currency) {
                var curSel = document.getElementById('dep-currency');
                if(curSel) curSel.value = pm.currency;
            }
            renderDepPmDetails();
            updateDepRateInfo();
        }

        function updateDepRateInfo() {
            var el = document.getElementById('dep-rate-info');
            if(!el) return;
            var C = getThemeColors();
            var pm = getCurrentDepPm();
            if(!pm || pm.type === 'CRYPTO') {
                el.innerHTML = '';
                return;
            }
            var curSel = document.getElementById('dep-currency');
            var cur = curSel ? curSel.value : 'YER';
            var rate;
            if(cur === 'SAR') {
                var yerRate = parseFloat(DB.getSetting('exchange_rate')) || 535;
                var sarCrossRate = parseFloat(DB.getSetting('exchange_rate_sar')) || 137.50;
                rate = yerRate / sarCrossRate;
            } else {
                rate = parseFloat(DB.getSetting('exchange_rate')) || 535;
            }
            var flag = cur === 'SAR' ? '🇸🇦' : '🇾🇪';
            el.innerHTML = '<div class="'+C.card+' rounded-lg p-3 border '+C.border+' flex items-center justify-between"><span class="text-xs '+C.muted+'">'+flag+' سعر الصرف: 1 USDT = '+fmtNum(rate,2)+' '+cur+'</span></div>';
        }

        function getCurrentDepPm() {
            var pmId = state.depPmId || (document.getElementById('dep-pm') ? document.getElementById('dep-pm').value : '');
            if(!pmId) return null;
            var merchantSelect = document.getElementById('dep-merchant');
            var merchantId = merchantSelect ? merchantSelect.value : '';
            if(merchantId) {
                var mMethods = getMerchantMethods(merchantId);
                return mMethods.find(function(p){return p.id===pmId;});
            }
            return DB.get('paymentMethods').find(function(p){return p.id===pmId;});
        }

        // Add listener for currency change
        document.addEventListener('change', function(e) { if(e.target && e.target.id === 'dep-currency') { renderDepPmDetails(); updateDepRateInfo(); } });

            var merchantSelect = document.getElementById('dep-merchant');

            var currency = isCrypto ? 'USDT' : currencySel;
            var usdtAmount = isCrypto ? amount : amount / rate;

        function changePassword() {
            var user = getUser();
            var oldPass = document.getElementById('set-old-pass').value;
            var newPass = document.getElementById('set-new-pass').value;
            var newPass2 = document.getElementById('set-new-pass2').value;
            if(!oldPass || !newPass) { toast('أكمل جميع الحقول','error'); return; }
            if(newPass !== newPass2) { toast('كلمات المرور غير متطابقة','error'); return; }
            if(newPass.length < 8) { toast('كلمة المرور يجب أن تكون 8 أحرف على الأقل','error'); return; }
            var users = DB.get('users');
            var u = users.find(function(x){return x.id===user.id;});
            if(!u) { toast('خطأ في العثور على المستخدم','error'); return; }
            var oldMatch = Security.checkPassword(oldPass, u.password) || oldPass === u.password;
            if(!oldMatch) { toast('كلمة المرور الحالية غير صحيحة','error'); return; }
            u.password = Security.hashPassword(newPass);
            u.passwordMustChange = false;
            DB.set('users', users);
            Security.addAuditLog(user.id, 'PASSWORD_CHANGE', 'تغيير كلمة المرور من الإعدادات');
            toast('تم تغيير كلمة المرور','success');
            document.getElementById('set-old-pass').value = '';
            document.getElementById('set-new-pass').value = '';
            document.getElementById('set-new-pass2').value = '';
        }

        function submitWm() {
            var user = getUser();
            var type = document.getElementById('wm-type').value;
            var wms = DB.get('userWithdrawalMethods');
            var method = { id: DB.uid(), userId: user.id, type: type };
            if(type === 'BANK') {
                var bankName = document.getElementById('wm-bank-name').value.trim();
                var account = document.getElementById('wm-account').value.trim();
                var recipient = document.getElementById('wm-recipient').value.trim();
                var subtype = document.getElementById('wm-subtype').value;
                var currency = document.getElementById('wm-currency').value;
                if(!bankName || !account || !recipient) { toast('أكمل جميع الحقول','error'); return; }
                method.bankName = bankName; method.accountNumber = account; method.recipientName = recipient;
                method.subtype = subtype; method.currency = currency;
            } else {
                var network = document.getElementById('wm-network').value;
                var address = document.getElementById('wm-address').value.trim();
                if(!address) { toast('أدخل عنوان المحفظة','error'); return; }
                method.currencyName = 'USDT'; method.network = network; method.address = address;

            wms.push(method);
            DB.set('userWithdrawalMethods', wms);

            render();

            messages.sort(function(a,b){return new Date(a.createdAt)-new Date(b.createdAt);});
            var msgsHtml = '';
            if(messages.length===0) msgsHtml = '<p class="'+C.muted+' text-center py-8 text-sm">ابدأ المحادثة مع فريق الدعم</p>';
            else {
                messages.forEach(function(m) {

                });
            }
            var msgsUnread = messages.filter(function(m){return m.fromId===adminId && !m.isRead;});
            if(msgsUnread.length>0) {
                var allMsgs = DB.get('messages');
                msgsUnread.forEach(function(m) {
                    var idx = allMsgs.findIndex(function(x){return x.id===m.id;});
                    if(idx>=0) allMsgs[idx].isRead = true;
                });
                DB.set('messages', allMsgs);
                // Re-render to update sidebar badge
                setTimeout(function(){ render(); }, 500);
            }
            setTimeout(function(){
                var chatBox = document.getElementById('user-chat-messages');
                if(chatBox) chatBox.scrollTop = chatBox.scrollHeight;
            }, 100);
            return '<div class="'+C.card+' rounded-xl border '+C.border+' flex flex-col" style="height:calc(100vh - 160px)">'+
                '<div class="p-4 border-b '+C.border+' flex items-center gap-3"><span class="text-2xl">💬</span><div><p class="font-bold '+C.text+'">الدعم الفني</p><p class="text-xs '+C.muted+'">فريق ForexYemeni</p></div></div>'+

                '<button onclick="sendUserChat()" class="'+C.btn+' px-5 py-2.5 rounded-lg btn text-sm">إرسال</button></div></div>';
        }

        function sendUserChat() {
            var user = getUser();
            var input = document.getElementById('user-chat-input');
            if(!input) return;
            var text = input.value.trim();
            if(!text) return;
            var adminUser = DB.get('users').find(function(u){return u.role==='ADMIN';});
            if(!adminUser) { toast('لا يوجد مشرف','error'); return; }
            var msgs = DB.get('messages');
            msgs.push({id:DB.uid(),fromId:user.id,toId:adminUser.id,text:text,isRead:false,createdAt:new Date().toISOString()});
            DB.set('messages', msgs);
            addNotif(adminUser.id, '💬 رسالة جديدة', 'رسالة من ' + user.name + ': ' + text.substring(0, 50), 'CHAT');
            input.value = '';
            render();
        }

        function requestAffiliate() {
            var user = getUser();
            var users = DB.get('users');
            var u = users.find(function(x){return x.id===user.id;});
            if(!u) return;
            u.affiliateStatus = 'PENDING';
            u.affiliateCode = 'FX' + Math.random().toString(36).substr(2, 6).toUpperCase();

            toast('تم إرسال طلب الانضمام لنظام العمولة','success');

        function withdrawAffiliateBalance() {
            var user = getUser();
            var balance = user.affiliateBalance || 0;
            if(balance <= 0) { toast('لا يوجد رصيد عمولات للسحب','warning'); return; }
            showConfirm('💰','سحب العمولات','سيتم تحويل '+fmtNum(balance)+' USDT من أرباح العمولات إلى رصيدك. متابعة؟','نعم، سحب','bg-success text-dark-bg',function(yes){
                if(!yes) return;
                var users = DB.get('users');
                var u = users.find(function(x){return x.id===user.id;});
                if(!u) return;
                u.usdtBalance = (u.usdtBalance||0) + balance;
                u.affiliateBalance = 0;
                DB.set('users', users);
                addLog(user.id,'AFFILIATE_WITHDRAW',balance,'USDT','سحب أرباح عمولات إلى الرصيد');
                toast('تم تحويل العمولات إلى رصيدك','success');
                render();
            });
        }

        function renderUserMerchants(C) {
            var allUsers = DB.get('users');
            var approvedMerchants = allUsers.filter(function(u){return u.role==='MERCHANT' && u.merchantStatus==='APPROVED' && !u.isBlocked;});
            var globalRate = parseFloat(DB.getSetting('exchange_rate')) || 535;
            var merchantRatings = DB.get('merchantRatings');
            var currentUser = getUser();
            var html = '<div class="'+C.card+' rounded-xl p-6 max-w-lg mx-auto border '+C.border+'">'+

            if(approvedMerchants.length === 0) {
                html += '<div class="text-center py-8"><p class="text-4xl mb-4">🏪</p><p class="'+C.muted+'">لا يوجد تجار نشطين حالياً</p></div>';
            } else {
                html += '<div class="space-y-3">';
                approvedMerchants.forEach(function(m) {
                    var mData = getMerchantPaymentData(m.id) || {};
                    var mRate = mData.exchangeRate || globalRate;
                    var mCommission = mData.commission || 0;
                    var mBal = m.usdtBalance || 0;
                    var txns = DB.get('merchantTransactions').filter(function(t){return t.merchantId===m.id;});
                    var completedTxns = txns.filter(function(t){return t.status==='APPROVED';}).length;
                    var mMethods = getMerchantMethods(m.id);
                    var hasCrypto = mMethods.some(function(pm){return pm.type==='CRYPTO';});
                    var hasBank = mMethods.some(function(pm){return pm.type==='BANK';});
                    // Rating
                    var mRatings = merchantRatings.filter(function(r){return r.merchantId===m.id;});
                    var avgRating = 0;
                    if(mRatings.length > 0) { avgRating = mRatings.reduce(function(s,r){return s+r.score;},0) / mRatings.length; avgRating = Math.round(avgRating * 10) / 10; }
                    var userRating = mRatings.find(function(r){return r.userId===(currentUser&&currentUser.id);});
                    var starsHtml = '';
                    for(var si = 1; si <= 5; si++) {
                        var filled = si <= Math.round(avgRating);
                        starsHtml += '<span class="cursor-pointer text-lg '+(filled?'text-warning':'text-gray-500')+'" onclick="rateMerchant(\''+m.id+'\','+si+')">'+(filled?'★':'☆')+'</span>';
                    }
                    var ratingText = mRatings.length > 0 ? avgRating+' ('+mRatings.length+')' : 'لا توجد تقييمات';
                    html += '<div class="p-4 rounded-lg border '+C.border+' overflow-hidden">'+
                        '<div class="flex items-center gap-3 mb-3">'+
                        '<div class="w-12 h-12 rounded-full bg-primary/20 flex items-center justify-center text-xl shrink-0">🏪</div>'+
                        '<div class="min-w-0 flex-1"><p class="font-bold text-sm '+C.text+'">'+escHtml(m.name)+'</p>'+
                        '<p class="text-xs '+C.muted+'">رصيد: <span class="text-success font-bold">'+fmtNum(mBal)+' USDT</span></p></div></div>'+
                        '<div class="flex items-center justify-between mb-2"><div>'+starsHtml+'</div><span class="text-xs '+C.muted+'">'+ratingText+'</span></div>'+
                        (userRating?'<p class="text-xs text-primary mb-1">تقييمك: '+userRating.score+' ★</p>':'')+
                        '<div class="grid grid-cols-2 gap-2 mb-3">'+
                        '<div class="'+C.card+' rounded-lg p-2 text-center"><p class="text-[10px] '+C.muted+'">💱 سعر الصرف</p><p class="font-bold text-sm text-primary">'+fmtNum(mRate)+' YER</p></div>'+
                        '<div class="'+C.card+' rounded-lg p-2 text-center"><p class="text-[10px] '+C.muted+'">📊 معاملات</p><p class="font-bold text-sm '+C.text+'">'+completedTxns+'</p></div></div>'+
                        '<div class="flex gap-2 text-xs mb-2">'+
                        (hasCrypto?'<span class="px-2 py-1 rounded bg-success/10 text-success font-medium">💳 USDT</span>':'')+
                        (hasBank?'<span class="px-2 py-1 rounded bg-info/10 text-info font-medium">🏦 بنكي</span>':'')+
                        (mCommission>0?'<span class="px-2 py-1 rounded bg-warning/10 text-warning font-medium">عمولة: '+mCommission+'%</span>':'')+
                        (!hasCrypto&&!hasBank?'<span class="px-2 py-1 rounded bg-gray-500/10 text-gray-400 font-medium">لم يعيّن بيانات</span>':'')+
                        '</div>'+
                        '<button onclick="openMerchantChat(\''+m.id+'\')" class="w-full py-2 rounded-lg text-xs font-medium btn border '+C.border+' '+C.text+' hover:border-primary hover:text-primary">💬 مراسلة التاجر</button>'+
                        '</div>';
                });
                html += '</div>';
            }
            html += '</div>';
            return html;
        }

        function rateMerchant(merchantId, score) {
            var user = getUser();
            if(!user) return;
            var ratings = DB.get('merchantRatings');
            var existing = ratings.find(function(r){return r.merchantId===merchantId && r.userId===user.id;});
            if(existing) {
                existing.score = score;
                existing.updatedAt = new Date().toISOString();
            } else {
                ratings.unshift({id:DB.uid(),merchantId:merchantId,userId:user.id,score:score,createdAt:new Date().toISOString()});
            }
            DB.set('merchantRatings', ratings);
            toast('تم تقييم التاجر: '+score+' نجوم','success',false);
            render();
        }

        function confirmMerchantApproveDeposit(depId) {
            closeModal();
            var user = getUser();
            var deposits = DB.get('deposits');
            var d = deposits.find(function(x){return x.id===depId;});
            if(!d) return;
            var users = DB.get('users');
            // Check if this deposit is assigned to a merchant and verify merchant balance
            var merchantId = d.assignedMerchantId;
            if(merchantId) {
                var merch = users.find(function(x){return x.id===merchantId;});
                if(merch && (merch.usdtBalance||0) < (d.usdtAmount||0)) {
                    toast('رصيد التاجر غير كافٍ لتنفيذ هذا الإيداع','error');
                    return;

            d.status = 'APPROVED';
            d.processedBy = user.id;
            var u = users.find(function(x){return x.id===d.userId;});
            if(u) { u.usdtBalance = (u.usdtBalance||0) + (d.usdtAmount||0); }
            // Deduct from merchant balance
            if(merchantId) {
                var merch2 = users.find(function(x){return x.id===merchantId;});
                if(merch2) { merch2.usdtBalance = Math.max(0, (merch2.usdtBalance||0) - (d.usdtAmount||0)); }
            }
            DB.set('users', users);
            calculateAffiliateCommission(d.userId, d.usdtAmount||0);
            DB.set('deposits', deposits);
            var mTxns = DB.get('merchantTransactions');
            mTxns.unshift({id:DB.uid(),merchantId:user.id,userId:d.userId,type:'DEPOSIT',amount:d.usdtAmount,status:'APPROVED',createdAt:new Date().toISOString()});
            DB.set('merchantTransactions', mTxns);

        function addMerchantMethod() {
            var user = getUser();
            var type = document.getElementById('mm-type').value;
            var method = {id:DB.uid(), merchantId:user.id, type:type};
            if(type === 'CRYPTO') {
                method.currencyName = document.getElementById('mm-currency-name').value.trim() || 'USDT';
                method.network = document.getElementById('mm-network').value;
                method.address = document.getElementById('mm-address').value.trim();
                if(!method.address) { toast('أدخل عنوان المحفظة','error'); return; }
            } else {
                var subtype = document.getElementById('mm-subtype').value;
                var currency = document.getElementById('mm-currency').value;
                method.subtype = subtype;
                method.currency = currency;
                if(subtype === 'wallet') {
                    method.bankName = document.getElementById('mm-bank-name').value.trim();
                    method.accountNumber = document.getElementById('mm-bank-account').value.trim();
                    method.recipientName = document.getElementById('mm-bank-recipient').value.trim();
                    if(!method.bankName || !method.accountNumber || !method.recipientName) { toast('أكمل جميع حقول المحفظة','error'); return; }
                } else {
                    method.recipientName = document.getElementById('mm-beneficiary').value.trim();
                    method.accountNumber = document.getElementById('mm-tel').value.trim();
                    method.bankName = document.getElementById('mm-net-name').value.trim();
                    if(!method.recipientName || !method.accountNumber) { toast('أكمل حقول التحويل','error'); return; }
                }
            }
            var methods = DB.get('merchantPaymentMethods') || [];
            methods.push(method);
            DB.set('merchantPaymentMethods', methods);
            closeModal();
            toast('تم إضافة طريقة الدفع','success');
            render();
        }

        function exportTransactionsCSV(userId) {
            var deposits, withdrawals, all = [];
            var users = DB.get('users');
            if(userId) {
                deposits = DB.get('deposits').filter(function(d){return d.userId===userId;});
                withdrawals = DB.get('withdrawals').filter(function(w){return w.userId===userId;});
            } else {
                deposits = DB.get('deposits');
                withdrawals = DB.get('withdrawals');
            }
            deposits.forEach(function(d){
                var u = users.find(function(x){return x.id===d.userId;});
                all.push({date:d.createdAt||'',type:'إيداع',amount:d.usdtAmount||0,currency:'USDT',status:d.status,user:u?u.name:'مستخدم'});
            });
            withdrawals.forEach(function(w){
                var u = users.find(function(x){return x.id===w.userId;});

            var type = document.getElementById('adj-type').value;

        function calculateAffiliateCommission(userId, amount) {
            var users = DB.get('users');
            var user = users.find(function(u){return u.id === userId;});
            if(!user || !user.referredBy) return;
            // Level 1
            var ref1 = users.find(function(u){return u.id === user.referredBy;});
            if(!ref1 || ref1.affiliateStatus !== 'APPROVED') return;
            var l1Pct = parseFloat(DB.getSetting('aff_l1')) || 5;
            var l1Comm = amount * l1Pct / 100;
            ref1.affiliateBalance = (ref1.affiliateBalance || 0) + l1Comm;
            addLog(ref1.id, 'AFFILIATE_EARNING', l1Comm, 'USDT', 'عمولة مستوى 1 من ' + (user.name || 'مستخدم'));
            addNotif(ref1.id, 'عمولة جديدة', 'حصلت على ' + fmtNum(l1Comm) + ' USDT عمولة مستوى 1', 'AFFILIATE');
            // Level 2
            var l2Pct = parseFloat(DB.getSetting('aff_l2')) || 3;
            if(l2Pct > 0 && ref1.referredBy) {
                var ref2 = users.find(function(u){return u.id === ref1.referredBy;});
                if(ref2 && ref2.affiliateStatus === 'APPROVED') {
                    var l2Comm = amount * l2Pct / 100;
                    ref2.affiliateBalance = (ref2.affiliateBalance || 0) + l2Comm;
                    addLog(ref2.id, 'AFFILIATE_EARNING', l2Comm, 'USDT', 'عمولة مستوى 2 من ' + (user.name || 'مستخدم'));
                    addNotif(ref2.id, 'عمولة جديدة', 'حصلت على ' + fmtNum(l2Comm) + ' USDT عمولة مستوى 2', 'AFFILIATE');
                    // Level 3
                    var l3Pct = parseFloat(DB.getSetting('aff_l3')) || 1;
                    if(l3Pct > 0 && ref2.referredBy) {
                        var ref3 = users.find(function(u){return u.id === ref2.referredBy;});
                        if(ref3 && ref3.affiliateStatus === 'APPROVED') {
                            var l3Comm = amount * l3Pct / 100;
                            ref3.affiliateBalance = (ref3.affiliateBalance || 0) + l3Comm;
                            addLog(ref3.id, 'AFFILIATE_EARNING', l3Comm, 'USDT', 'عمولة مستوى 3 من ' + (user.name || 'مستخدم'));
                            addNotif(ref3.id, 'عمولة جديدة', 'حصلت على ' + fmtNum(l3Comm) + ' USDT عمولة مستوى 3', 'AFFILIATE');
                        }
                    }
                }
            }
            DB.set('users', users);
        }

            var withdrawals = DB.get('withdrawals');
            withdrawals.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);});
            var pendingCount = withdrawals.filter(function(w){return w.status==='PENDING';}).length;
            var processingCount = withdrawals.filter(function(w){return w.status==='PROCESSING';}).length;
            return '<div class="'+C.card+' rounded-xl p-6 border '+C.border+'">'+
                '<h2 class="text-xl font-bold '+C.text+' mb-4">🏧 السحوبات ('+withdrawals.length+')</h2>'+
                '<div class="flex gap-2 mb-4 flex-wrap">'+
                '<button onclick="filterAdminWithdrawals(\'ALL\')" class="px-3 py-1.5 rounded-lg text-sm btn '+C.btn+'">الكل</button>'+
                '<button onclick="filterAdminWithdrawals(\'PENDING\')" class="px-3 py-1.5 rounded-lg text-sm btn bg-warning text-dark-bg">معلق ('+pendingCount+')</button>'+
                '<button onclick="filterAdminWithdrawals(\'RECEIVED\')" class="px-3 py-1.5 rounded-lg text-sm btn bg-blue-500 text-white">مستلم</button>'+
                '<button onclick="filterAdminWithdrawals(\'PROCESSING\')" class="px-3 py-1.5 rounded-lg text-sm btn bg-info text-white">قيد المعالجة ('+processingCount+')</button>'+
                '<button onclick="filterAdminWithdrawals(\'APPROVED\')" class="px-3 py-1.5 rounded-lg text-sm btn bg-success text-dark-bg">مقبول</button>'+
                '<button onclick="filterAdminWithdrawals(\'REJECTED\')" class="px-3 py-1.5 rounded-lg text-sm btn bg-danger text-white">مرفوض</button></div>'+
                '<div id="admin-withdrawals-list" class="space-y-3 max-h-[70vh] overflow-y-auto">'+renderAdminWithdrawalsList(withdrawals, C)+'</div></div>';
        }

        function renderAdminWithdrawalsList(withdrawals, C, filterStatus) {
            if(!C) C = getThemeColors();

            if(filterStatus && filterStatus !== 'ALL') filtered = withdrawals.filter(function(w){return w.status===filterStatus;});
            if(filtered.length===0) return '<p class="'+C.muted+' text-center py-4">لا توجد سحوبات</p>';
            var users = DB.get('users');
            var wms = DB.get('userWithdrawalMethods');
            return filtered.map(function(w) {
                var u = users.find(function(x){return x.id===w.userId;});
                var method = wms.find(function(x){return x.id===w.withdrawalMethodId;});
                var methodInfo = '';
                var copyableFields = '';
                if(method) {
                    var bnkAddr = escHtml(method.accountNumber||'');
                    var bnkRcp = escHtml(method.recipientName||'');
                    var cryptoAddr = escHtml(method.address||'');
                    if(method.type==='BANK') {
                        methodInfo = escHtml(method.bankName||'');
                        copyableFields = '<div class="'+C.card+' rounded-lg p-3 mb-3 space-y-2 border '+C.border+'">'+
                            '<p class="text-xs font-bold '+C.text+'">🏦 تفاصيل التحويل البنكي:</p>'+
                            '<div class="flex items-center justify-between py-1"><span class="text-xs '+C.muted+'">البنك:</span><span class="text-xs font-medium '+C.text+'">'+escHtml(method.bankName||'—')+'</span></div>'+
                            '<div class="flex items-center justify-between py-1"><span class="text-xs '+C.muted+'">رقم الحساب:</span><div class="flex items-center gap-1"><span class="text-xs font-mono font-bold '+C.text+'">'+bnkAddr+'</span><button onclick="copyText(\''+bnkAddr.replace(/'/g,"\\'")+'\')" class="copy-btn">📋</button></div></div>'+
                            '<div class="flex items-center justify-between py-1"><span class="text-xs '+C.muted+'">اسم المستفيد:</span><div class="flex items-center gap-1"><span class="text-xs font-medium '+C.text+'">'+bnkRcp+'</span><button onclick="copyText(\''+bnkRcp.replace(/'/g,"\\'")+'\')" class="copy-btn">📋</button></div></div>'+
                            (method.subtype?'<div class="flex items-center justify-between py-1"><span class="text-xs '+C.muted+'">نوع الحساب:</span><span class="text-xs font-medium '+C.text+'">'+escHtml(method.subtype)+'</span></div>':'')+
                            '</div>';
                    } else {
                        methodInfo = escHtml(method.network||'');
                        copyableFields = '<div class="'+C.card+' rounded-lg p-3 mb-3 space-y-2 border '+C.border+'">'+
                            '<p class="text-xs font-bold '+C.text+'">💳 تفاصيل المحفظة الرقمية:</p>'+
                            '<div class="flex items-center justify-between py-1"><span class="text-xs '+C.muted+'">الشبكة:</span><span class="text-xs font-medium '+C.text+'">'+escHtml(method.network||'—')+'</span></div>'+
                            '<div class="py-1"><div class="flex items-center justify-between mb-1"><span class="text-xs '+C.muted+'">العنوان:</span><button onclick="copyText(\''+cryptoAddr.replace(/'/g,"\\'")+'\')" class="copy-btn">📋 نسخ</button></div><p class="font-mono text-xs '+C.text+' break-all rounded p-2 border '+C.border+'">'+cryptoAddr+'</p></div>'+
                            (method.currencyName?'<div class="flex items-center justify-between py-1"><span class="text-xs '+C.muted+'">العملة:</span><span class="text-xs font-medium text-primary">'+escHtml(method.currencyName)+'</span></div>':'')+
                            '</div>';
                    }
                }
                var processedBy = '';
                if(w.processedBy) {
                    var processor = users.find(function(x){return x.id===w.processedBy;});
                    if(processor) processedBy = '<span class="text-xs '+C.muted+'"> بواسطة: '+escHtml(processor.name)+'</span>';
                }
                var assignedMerchantName = '';
                if(w.assignedMerchantId) {
                    var assignedM = users.find(function(m){return m.id===w.assignedMerchantId;});
                    if(assignedM) assignedMerchantName = escHtml(assignedM.name);
                }
                return '<div class="p-4 rounded-lg border '+C.border+'">'+
                    '<div class="flex items-center justify-between mb-2">'+
                    '<div><p class="font-medium text-sm '+C.text+'">'+escHtml(u?u.name:'مستخدم محذوف')+'</p><p class="text-xs '+C.muted+'">'+fmtDate(w.createdAt)+'</p></div>'+
                    '<div class="text-left">'+statusBadge(w.status)+processedBy+'</div></div>'+
                    '<div class="grid grid-cols-3 gap-2 text-xs mb-3">'+
                    '<div class="'+C.card+' rounded p-2"><p class="'+C.muted+'">المبلغ</p><p class="font-bold text-danger">'+fmtNum(w.amount)+(w.currency&&w.currency!=='USDT'?' '+w.currency:'')+'</p></div>'+
                    '<div class="'+C.card+' rounded p-2"><p class="'+C.muted+'">الرسوم</p><p class="font-bold">'+fmtNum(w.fee||0)+'</p></div>'+
                    '<div class="'+C.card+' rounded p-2"><p class="'+C.muted+'">الصافي</p><p class="font-bold text-danger">'+fmtNum(w.net||0)+'</p></div></div>'+

                    (w.notes?'<p class="text-xs '+C.muted+' mb-2">ملاحظات: '+escHtml(w.notes)+'</p>':'')+
                    (w.rejectReason?'<div class="mb-2 p-2 rounded-lg bg-danger/10 border border-danger/30"><p class="text-xs text-danger font-bold">❌ سبب الرفض:</p><p class="text-xs text-danger/80">'+escHtml(w.rejectReason)+'</p></div>':'')+
                    (w.confirmScreenshot?'<div class="mb-3"><p class="text-xs '+C.muted+' mb-1">لقطة تأكيد التنفيذ:</p><img src="'+w.confirmScreenshot+'" class="h-24 rounded-lg border cursor-pointer object-cover" onclick="showImageModal(this.src)"></div>':'')+

                    (w.status==='RECEIVED'?'<div class="flex gap-2"><button onclick="adminStartProcessing(\''+w.id+'\')" class="flex-1 py-2 rounded-lg font-bold btn bg-warning text-dark-bg text-sm">✅ تمت الموافقة وخصم الرصيد</button><button onclick="adminRejectWithdrawal(\''+w.id+'\')" class="flex-1 py-2 rounded-lg font-bold btn bg-danger text-white text-sm">❌ رفض</button></div>':'')+
                    (w.status==='PROCESSING'?'<div class="flex gap-2"><button onclick="adminApproveWithdrawal(\''+w.id+'\')" class="flex-1 py-2 rounded-lg font-bold btn bg-success text-dark-bg text-sm">✅ تأكيد التنفيذ</button></div>':'')+
                    '</div>';
            }).join('');
        }

        function filterAdminWithdrawals(status) {
            var withdrawals = DB.get('withdrawals');
            withdrawals.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);});
            var C = getThemeColors();
            document.getElementById('admin-withdrawals-list').innerHTML = renderAdminWithdrawalsList(withdrawals, C, status);
        }

        function adminReceiveWithdrawal(wdId) {
            showConfirm('📋','استلام طلب السحب','هل تم استلام طلب السحب؟','نعم، تم الاستلام','bg-info text-white',function(yes){
                if(!yes) return;
                var withdrawals = DB.get('withdrawals');
                var w = withdrawals.find(function(x){return x.id===wdId;});
                if(!w) return;
                w.status = 'RECEIVED';
                var adminUser = getUser();
                w.processedBy = adminUser ? adminUser.id : null;
                w.receivedAt = new Date().toISOString();
                DB.set('withdrawals', withdrawals);
                addNotif(w.userId,'تم استلام طلب السحب','تم استلام طلب سحبك بمبلغ '+fmtNum(w.net||0)+' USDT وجاري المراجعة.','INFO');
                toast('تم تأكيد استلام الطلب','success');
                render();
            });
        }

        function adminStartProcessing(wdId) {
            var withdrawals = DB.get('withdrawals');
            var w = withdrawals.find(function(x){return x.id===wdId;});
            if(!w) return;
            showConfirm('✅','موافقة على السحب وخصم الرصيد','سيتم خصم '+fmtNum(w.amount||0)+' USDT من رصيد المستخدم وإرسال إشعار له. متابعة؟','نعم، موافقة','bg-success text-dark-bg',function(yes){
                if(!yes) return;
                var withdrawals = DB.get('withdrawals');
                var w = withdrawals.find(function(x){return x.id===wdId;});
                if(!w) return;
                w.status = 'PROCESSING';
                var adminUser = getUser();
                w.processedBy = adminUser ? adminUser.id : w.processedBy;
                w.approvedAt = new Date().toISOString();
                var users = DB.get('users');
                var u = users.find(function(x){return x.id===w.userId;});
                if(u) { u.usdtBalance = Math.max(0, (u.usdtBalance||0) - (w.amount||0)); DB.set('users', users); }
                DB.set('withdrawals', withdrawals);
                addNotif(w.userId,'تمت الموافقة على السحب','تمت الموافقة على سحبك بمبلغ '+fmtNum(w.net||0)+' USDT. بانتظار رفع إثبات التنفيذ.','WITHDRAW');
                toast('تمت الموافقة - يجب رفع لقطة إثبات التنفيذ','success');
                render();
            });
        }

        function adminApproveWithdrawal(wdId) {
            var C = getThemeColors();
            showModal('<h3 class="text-lg font-bold '+C.text+' mb-4">✅ تأكيد تنفيذ السحب</h3>'+
                '<p class="text-sm '+C.muted+' mb-4">سيتم تأكيد إكمال السحب وإرسال إشعار للمستخدم.</p>'+
                '<button onclick="confirmAdminWdApprove(\''+wdId+'\')" class="'+C.btn+' w-full py-3 rounded-lg font-bold btn">نعم، تأكيد التنفيذ</button>'+
                '<button onclick="closeModal()" class="w-full py-2.5 rounded-lg border '+C.border+' '+C.text+' btn mt-2">إلغاء</button>');
        }

        function confirmAdminWdApprove(wdId) {
            closeModal();
            var withdrawals = DB.get('withdrawals');
            var w = withdrawals.find(function(x){return x.id===wdId;});
            if(!w) return;
            w.status = 'APPROVED';
            var adminUser = getUser();
            w.processedBy = adminUser ? adminUser.id : w.processedBy;
            w.completedAt = new Date().toISOString();
            DB.set('withdrawals', withdrawals);
            addLog(w.userId,'WITHDRAW_APPROVED',w.net,'USDT','تم إكمال سحب '+fmtNum(w.net)+' USDT');
            addNotif(w.userId,'سحب مكتمل','تم إكمال سحبك بمبلغ '+fmtNum(w.net)+' USDT.','WITHDRAW');
            toast('تم تأكيد إكمال السحب','success');
            render();
        }

        function adminRejectWithdrawal(wdId) {
            var C = getThemeColors();
            showModal('<h3 class="text-lg font-bold '+C.text+' mb-4">❌ رفض السحب</h3>'+
                '<div class="space-y-3">'+
                '<p class="text-sm '+C.muted+'">سيتم استرداد الرصيد للمستخدم. اكتب سبب الرفض:</p>'+
                '<textarea id="admin-wd-reject-reason" class="w-full px-4 py-2.5 rounded-lg border '+C.input+' outline-none h-24" placeholder="سبب الرفض..."></textarea>'+
                '<button onclick="confirmAdminWdReject(\''+wdId+'\')" class="w-full py-3 rounded-lg font-bold btn bg-danger text-white">تأكيد الرفض</button>'+
                '<button onclick="closeModal()" class="w-full py-2.5 rounded-lg border '+C.border+' '+C.text+' btn">إلغاء</button></div>');
        }

        function confirmAdminWdReject(wdId) {
            var reason = document.getElementById('admin-wd-reject-reason').value.trim();
            if(!reason) { toast('يجب كتابة سبب الرفض','error'); return; }
            closeModal();
            var withdrawals = DB.get('withdrawals');
            var w = withdrawals.find(function(x){return x.id===wdId;});
            if(!w) return;
            w.status = 'REJECTED';
            w.rejectReason = reason;
            var users = DB.get('users');
            var u = users.find(function(x){return x.id===w.userId;});
            if(u) { u.usdtBalance = (u.usdtBalance||0) + (w.amount||0); DB.set('users', users); }
            DB.set('withdrawals', withdrawals);
            addLog(w.userId,'WITHDRAW_REJECTED',w.amount,'USDT','تم رفض السحب واسترداد '+fmtNum(w.amount)+' USDT. السبب: '+reason);
            addNotif(w.userId,'سحب مرفوض','تم رفض سحبك. تم استرداد المبلغ. السبب: '+reason,'WITHDRAW');
            toast('تم رفض السحب واسترداد الرصيد','success');
            render();
        }

        // ==================== DYNAMIC IMAGE MODAL ====================
        function showDynamicImageModal(id, collection) {
            var imgSrc = '';
            if(collection === 'deposit') { var d = DB.get('deposits').find(function(x){return x.id===id;}); if(d) imgSrc = d.receipt; }
            else if(collection === 'kyc-front') { var k = DB.get('kycDocuments').find(function(x){return x.id===id;}); if(k) imgSrc = k.frontId; }
            else if(collection === 'kyc-back') { var k2 = DB.get('kycDocuments').find(function(x){return x.id===id;}); if(k2) imgSrc = k2.backId; }
            else if(collection === 'kyc-selfie') { var k3 = DB.get('kycDocuments').find(function(x){return x.id===id;}); if(k3) imgSrc = k3.selfieWithId; }
            else if(collection === 'kyc-address') { var ka = DB.get('kycDocuments').find(function(x){return x.id===id;}); if(ka) imgSrc = ka.proofOfAddress; }
            else if(collection === 'merch-front') { var m1 = DB.get('merchantRequests').find(function(x){return x.id===id;}); if(m1) imgSrc = m1.frontId; }
            else if(collection === 'merch-back') { var m2 = DB.get('merchantRequests').find(function(x){return x.id===id;}); if(m2) imgSrc = m2.backId; }
            else if(collection === 'merch-selfie') { var m3 = DB.get('merchantRequests').find(function(x){return x.id===id;}); if(m3) imgSrc = m3.selfieWithId; }
            else if(collection === 'merch-address') { var m4 = DB.get('merchantRequests').find(function(x){return x.id===id;}); if(m4) imgSrc = m4.proofOfAddress; }
            if(imgSrc) showImageModal(imgSrc);
        }
        // ==================== ADMIN: KYC ====================

                (pending.length===0 ? '<p class="'+C.muted+' text-center py-8">لا توجد طلبات توثيق معلقة</p>' :
                '<div class="space-y-4 max-h-[70vh] overflow-y-auto">'+pending.map(function(k) {
                    var u = DB.get('users').find(function(x){return x.id===k.userId;});
                    var isMerchant = u && u.role === 'MERCHANT';
                    var roleLabel = isMerchant ? '<span class="px-2 py-0.5 rounded-full bg-primary/20 text-primary text-[10px] font-bold">🏪 تاجر</span>' : '<span class="px-2 py-0.5 rounded-full bg-info/20 text-info text-[10px] font-bold">👤 مستخدم</span>';
                    var addressImg = k.proofOfAddress ? '<div><p class="text-xs '+C.muted+' mb-1">🏠 إثبات العنوان</p><img src="'+k.proofOfAddress+'" class="h-32 rounded-lg border cursor-pointer object-cover" onclick="showDynamicImageModal(\''+k.id+'\',\'kyc-address\')"></div>' : '';
                    var gridCols = k.proofOfAddress ? 'grid grid-cols-2 md:grid-cols-4 gap-3' : 'grid grid-cols-3 gap-3';
                    return '<div class="p-4 rounded-lg border '+C.border+'">'+
                        '<div class="flex items-center justify-between mb-3"><div class="flex items-center gap-2"><p class="font-medium text-sm '+C.text+'">'+escHtml(u?u.name:'مستخدم محذوف')+'</p>'+roleLabel+'</div>'+statusBadge('PENDING')+'</div>'+
                        '<p class="text-xs '+C.muted+' mb-3">'+escHtml(u?u.phone:'')+' | '+fmtDate(k.createdAt)+'</p>'+
                        '<div class="'+gridCols+' mb-4">'+
                        '<div><p class="text-xs '+C.muted+' mb-1">الوجه الأمامي</p><img src="'+k.frontId+'" class="h-32 rounded-lg border cursor-pointer object-cover" onclick="showDynamicImageModal(\''+k.id+'\',\'kyc-front\')"></div>'+
                        '<div><p class="text-xs '+C.muted+' mb-1">الوجه الخلفي</p><img src="'+k.backId+'" class="h-32 rounded-lg border cursor-pointer object-cover" onclick="showDynamicImageModal(\''+k.id+'\',\'kyc-back\')"></div>'+
                        '<div><p class="text-xs '+C.muted+' mb-1">سيلفي مع الهوية</p><img src="'+k.selfieWithId+'" class="h-32 rounded-lg border cursor-pointer object-cover" onclick="showDynamicImageModal(\''+k.id+'\',\'kyc-selfie\')"></div>'+
                        addressImg+
                        '</div>'+
                        '<div class="flex gap-2"><button onclick="approveKYC(\''+k.id+'\')" class="flex-1 py-2 rounded-lg font-bold btn bg-success text-dark-bg text-sm">✅ قبول</button><button onclick="rejectKYC(\''+k.id+'\')" class="flex-1 py-2 rounded-lg font-bold btn bg-danger text-white text-sm">❌ رفض</button></div></div>';
                }).join('')+'</div>')+'</div>';
        }

        function approveKYC(kycId) {
            var docs = DB.get('kycDocuments');
            var k = docs.find(function(x){return x.id===kycId;});
            if(!k) return;
            k.status = 'APPROVED';
            var users = DB.get('users');
            var u = users.find(function(x){return x.id===k.userId;});
            if(u) { u.kycStatus = 'APPROVED'; DB.set('users', users); }
            DB.set('kycDocuments', docs);
            addNotif(k.userId,'توثيق مقبول','تم قبول توثيق هويتك بنجاح','KYC');
            toast('تم قبول التوثيق','success');
            render();
        }

        function rejectKYC(kycId) {
            var C = getThemeColors();
            showModal('<h3 class="text-lg font-bold '+C.text+' mb-4">❌ رفض التوثيق</h3>'+
                '<textarea id="kyc-reject-reason" class="w-full px-4 py-2.5 rounded-lg border '+C.input+' outline-none h-24" placeholder="سبب الرفض..."></textarea>'+
                '<button onclick="confirmRejectKYC(\''+kycId+'\')" class="bg-danger text-white w-full py-2.5 rounded-lg font-bold btn mt-3">تأكيد الرفض</button></div>');
        }

        function confirmRejectKYC(kycId) {
            var reason = document.getElementById('kyc-reject-reason').value.trim();
            if(!reason) { toast('أدخل سبب الرفض','error'); return; }
            var docs = DB.get('kycDocuments');
            var k = docs.find(function(x){return x.id===kycId;});
            if(!k) return;
            k.status = 'REJECTED'; k.rejectReason = reason;
            var users = DB.get('users');
            var u = users.find(function(x){return x.id===k.userId;});
            if(u) { u.kycStatus = 'NOT_SUBMITTED'; DB.set('users', users); }
            DB.set('kycDocuments', docs);
            addNotif(k.userId,'توثيق مرفوض','تم رفض توثيق هويتك. السبب: '+reason,'KYC');
            closeModal();
            toast('تم رفض التوثيق','success');
            render();
        }

                    var typeLabel = pm.type==='CRYPTO'?'عملات رقمية':'تحويل بنكي';

        function saveAddPm() {
            var type = document.getElementById('pm-add-type').value;
            var minDep = parseFloat(document.getElementById('pm-add-min-dep').value) || 0;
            var minWd = parseFloat(document.getElementById('pm-add-min-wd').value) || 0;
            var pms = DB.get('paymentMethods');
            var pm = { id: DB.uid(), title: '', type: type, subtype: '', currency: '', network: '', address: '', recipientName: '', accountNumber: '', bankName: '', isActive: true, sortOrder: pms.length, minDeposit: minDep, minWithdraw: minWd };
            if(type === 'CRYPTO') {
                pm.network = document.getElementById('pm-add-network').value;
                pm.address = document.getElementById('pm-add-address').value.trim();
                if(!pm.address) { toast('أدخل عنوان الشبكة','error'); return; }
            } else {
                var subtype = document.getElementById('pm-add-subtype').value;
                pm.subtype = subtype;
                pm.currency = document.getElementById('pm-add-currency').value;
                if(subtype === 'wallet') {
                    pm.bankName = document.getElementById('pm-add-bank-name').value.trim();
                    pm.accountNumber = document.getElementById('pm-add-account').value.trim();
                    pm.recipientName = document.getElementById('pm-add-recipient').value.trim();

        // ==================== ADMIN: CHAT (FIXED) ====================
        function renderAdminChat(C) {
            var adminUser = DB.get('users').find(function(u){return u.role==='ADMIN';});
            var adminId = adminUser ? adminUser.id : 'admin1';
            var allUsers = DB.get('users').filter(function(u){return u.role !== 'ADMIN';});
            var messages = DB.get('messages');
            // Set default chat user
            if(!state.activeChatUserId && allUsers.length > 0) {
                state.activeChatUserId = allUsers[0].id;
            }
            var chatUserId = state.activeChatUserId;
            var chatUser = allUsers.find(function(u){return u.id===chatUserId;});
            // Build user selector with unread counts
            var userOpts = allUsers.map(function(u) {
                var unread = messages.filter(function(m){return m.fromId===u.id && m.toId===adminId && !m.isRead;}).length;
                var isMerch = u.role === 'MERCHANT';
                var label = (isMerch?'🏪 ':'👤 ')+escHtml(u.name)+(unread>0?' ('+unread+' جديد)':'');
                return '<option value="'+u.id+'" '+(chatUserId===u.id?'selected':'')+'>'+label+'</option>';
            }).join('');
            // Get messages for selected user
            var chatMsgs = [];
            if(chatUserId) {
                chatMsgs = messages.filter(function(m){return (m.fromId===chatUserId&&m.toId===adminId)||(m.fromId===adminId&&m.toId===chatUserId);}).sort(function(a,b){return new Date(a.createdAt)-new Date(b.createdAt);});
                // Mark messages from this user as read
                var unreadAdmin = chatMsgs.filter(function(m){return m.fromId===chatUserId && !m.isRead;});
                if(unreadAdmin.length>0) {
                    var allMsgs = DB.get('messages');
                    unreadAdmin.forEach(function(m) {
                        var idx = allMsgs.findIndex(function(x){return x.id===m.id;});
                        if(idx>=0) allMsgs[idx].isRead = true;
                    });
                    DB.set('messages', allMsgs);
                }
            }
            var msgsHtml = '';
            if(!chatUser) msgsHtml = '<p class="'+C.muted+' text-center py-8">لا يوجد مستخدمين</p>';
            else if(chatMsgs.length===0) msgsHtml = '<p class="'+C.muted+' text-center py-8 text-sm">لا توجد رسائل بعد مع '+escHtml(chatUser.name)+'</p>';
            else {
                chatMsgs.forEach(function(m) {
                    var isMe = m.fromId === adminId;
                    msgsHtml += '<div class="flex '+(isMe?'justify-start':'justify-end')+' mb-3">'+
                        '<div class="max-w-[75%] px-4 py-2.5 rounded-xl '+(isMe?'chat-bubble-me':'chat-bubble-other')+'"><p>'+escHtml(m.text)+'</p><p class="text-[10px] opacity-60 mt-1">'+fmtDate(m.createdAt)+'</p></div></div>';
                });
            }
            setTimeout(function(){
                var chatBox = document.getElementById('admin-chat-messages');
                if(chatBox) chatBox.scrollTop = chatBox.scrollHeight;
            }, 100);
            var chatHeader = chatUser ?
                '<div class="flex items-center gap-2"><div class="w-9 h-9 rounded-full '+(chatUser.role==='MERCHANT'?'bg-primary/20':'bg-info/20')+' flex items-center justify-center text-sm">'+(chatUser.role==='MERCHANT'?'🏪':'👤')+'</div><div><p class="font-bold text-sm '+C.text+'">'+escHtml(chatUser.name)+'</p><p class="text-[10px] '+C.muted+'">'+escHtml(chatUser.phone)+'</p></div></div>' :
                '<p class="font-bold text-sm '+C.text+'">اختر مستخدم</p>';
            return '<div class="'+C.card+' rounded-xl border '+C.border+' flex flex-col" style="height:calc(100vh - 160px)">'+
                '<div class="p-3 border-b '+C.border+' space-y-2">'+
                '<div class="flex items-center gap-2"><span class="text-2xl">💬</span><div><p class="font-bold '+C.text+'">الدعم الفني</p><p class="text-xs '+C.muted+'">الرد على المستخدمين</p></div></div>'+
                '<select id="admin-chat-user-select" class="w-full px-3 py-2 rounded-lg border '+C.input+' outline-none text-sm" onchange="state.activeChatUserId=this.value;render()">'+userOpts+'</select>'+
                '<div class="flex items-center gap-2">'+chatHeader+'</div>'+
                '</div>'+
                '<div id="admin-chat-messages" class="flex-1 overflow-y-auto p-4 space-y-1">'+msgsHtml+'</div>'+
                '<div class="p-3 border-t '+C.border+' flex gap-2"><input type="text" id="admin-chat-input" class="flex-1 px-4 py-2.5 rounded-lg border '+C.input+' outline-none text-sm" placeholder="اكتب رسالتك..." onkeydown="if(event.key===\'Enter\')sendAdminChat()">'+
                '<button onclick="sendAdminChat()" class="'+C.btn+' px-5 py-2.5 rounded-lg btn text-sm">إرسال</button></div></div>';
        }

        function sendAdminChat() {
            var input = document.getElementById('admin-chat-input');
            if(!input || !state.activeChatUserId) return;
            var text = input.value.trim();
            if(!text) return;
            var adminUser = DB.get('users').find(function(u){return u.role==='ADMIN';});
            var adminId = adminUser ? adminUser.id : 'admin1';
            var targetUser = DB.get('users').find(function(u){return u.id === state.activeChatUserId;});
            var msgs = DB.get('messages');
            msgs.push({id:DB.uid(),fromId:adminId,toId:state.activeChatUserId,text:text,isRead:false,createdAt:new Date().toISOString()});
            DB.set('messages', msgs);
            addNotif(state.activeChatUserId, '💬 رسالة من الإدارة', text.substring(0, 80), 'CHAT');
            input.value = '';
            render();
        }

        function saveAdminMerchantCommission(merchantId) {
            var users = DB.get('users');
            var m = users.find(function(x){return x.id===merchantId;});
            if(!m) return;
            var allData = DB.get('merchantPaymentData');
            var mData = allData[merchantId] || {};
            if(mData.dailyAdminCommission !== undefined && mData.dailyAdminCommission !== '' && mData.dailyAdminCommission > 0) {
                toast('⚠️ لا يمكن تعديل العمولة بعد تحديدها. حذف التاجر وأعد إنشائه لتغييرها.','error');
                return;
            }
            var percent = parseFloat(document.getElementById('admin-comm-percent').value);
            if(!percent || percent <= 0 || percent > 100) { toast('أدخل نسبة صحيحة (0.1 - 100)','error'); return; }
            if(!allData || typeof allData !== 'object') allData = {};
            if(!allData[merchantId]) allData[merchantId] = {};
            allData[merchantId].dailyAdminCommission = percent;
            allData[merchantId].updatedAt = new Date().toISOString();
            DB.set('merchantPaymentData', allData);
            addNotif(merchantId,'تحديد عمولة','تم تحديد عمولة '+percent+'% يومية على معاملاتك من الإدارة. لا يمكن تغييرها إلا بحذف حسابك وإعادة إنشائه.','WARNING');
            closeModal(); toast('تم تحديد العمولة: '+percent+'% - لا يمكن تعديلها','success');
            render();
        }

        function executeDailyAdminCommissions() {
            var users = DB.get('users');
            var allData = DB.get('merchantPaymentData');
            if(!allData || typeof allData !== 'object') return;
            var merchants = users.filter(function(u){return u.role==='MERCHANT' && !u.isBlocked;});
            var totalCollected = 0;
            merchants.forEach(function(m) {
                var mData = allData[m.id] || {};
                var commPercent = mData.dailyAdminCommission || 0;
                if(commPercent <= 0) return;
                var mTxns = DB.get('merchantTransactions').filter(function(t){return t.merchantId===m.id && t.status==='APPROVED';});
                var today = new Date().toISOString().split('T')[0];
                var todayTxns = mTxns.filter(function(t){return (t.createdAt||'').split('T')[0] === today;});
                var todayVolume = todayTxns.reduce(function(s,t){return s+(t.amount||0);},0);
                if(todayVolume <= 0) return;
                var commAmount = todayVolume * commPercent / 100;
                if(commAmount <= 0 || commAmount > (m.usdtBalance||0)) return;
                m.usdtBalance = (m.usdtBalance||0) - commAmount;
                totalCollected += commAmount;
                allData[m.id].adminCommission = (allData[m.id].adminCommission||0) + commAmount;
                addLog(m.id,'DAILY_COMMISSION',commAmount,'USDT','عمولة يومية ('+commPercent+'%): '+fmtNum(commAmount)+' USDT من حجم '+fmtNum(todayVolume)+' USDT');
                addNotif(m.id,'خصم عمولة يومية','تم خصم '+fmtNum(commAmount)+' USDT ('+commPercent+'% من '+fmtNum(todayVolume)+' USDT) كعمولة يومية للإدارة','WARNING');
            });
            if(totalCollected > 0) {
                DB.set('users', users);
                DB.set('merchantPaymentData', allData);
            }
        }

        function parseFirebaseConfigSnippet(raw) {
            raw = raw.trim();
            // Try direct JSON parse first
            try { return JSON.parse(raw); } catch(e) {}
            // Try extracting from JavaScript snippet: const firebaseConfig = { ... }; or var firebaseConfig = { ... };
            var patterns = [
                /(?:const|var|let)\s+\w+\s*=\s*(\{[\s\S]*?\})\s*;/,
                /(\{[\s\S]*?"apiKey"[\s\S]*?\})/,
                /(\{[\s\S]*?"projectId"[\s\S]*?\})/
            ];
            for (var i = 0; i < patterns.length; i++) {
                var match = raw.match(patterns[i]);
                if (match) {
                    var jsonStr = match[1].trim();
                    // Replace unquoted keys with quoted keys for JSON.parse
                    jsonStr = jsonStr.replace(/(\w+)\s*:/g, '"$1":');
                    // Fix double-quoted keys that were already quoted
                    jsonStr = jsonStr.replace(/""/g, '"');
                    try { var parsed = JSON.parse(jsonStr); return parsed; } catch(e2) {
                        // Try eval as last resort for JS object syntax
                        try {
                            var obj = (new Function('return ' + match[1].trim()))();
                            if (obj && typeof obj === 'object') return obj;
                        } catch(e3) {}
                    }
                }
            }
            return null;
        }

        }

        function pasteFromClipboard() {
            if(navigator.clipboard && navigator.clipboard.readText) {
                navigator.clipboard.readText().then(function(text) {
                    if(text) {
                        var snippetEl = document.getElementById('db-config-snippet');
                        if(snippetEl) { snippetEl.value = text.trim(); window._dbTestSuccess = false; toast('تم اللصق','success',false); }
                    }
                }).catch(function() { toast('لا يمكن الوصول للحافظة','warning',false); });
            } else { toast('المتصفح لا يدعم لصق الحافظة','warning',false); }
